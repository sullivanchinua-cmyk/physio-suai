##############################################################
# PHYSIO SUAI — .github/workflows/android.yml
# GitHub Actions: Debug APK on every push to main
# Release AAB on version tags (v*)
##############################################################

name: Build Physio SUAI Android

on:
  push:
    branches: [ main, dev ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:

  ##############################################################
  # JOB 1 — Build debug APK
  ##############################################################
  build-debug:
    name: Debug APK
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/')"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      # webDir="src" — Capacitor reads src/ directly. No Vite build needed.

      - name: Sync Capacitor (no build)
        run: npx cap sync android --no-build

      - name: Place google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Copy sound assets to Android res/raw
        run: |
          mkdir -p android/app/src/main/res/raw
          cp src/1774_alarm.mp3 android/app/src/main/res/raw/alarm_1774.mp3
          cp src/mixkit_positive_notification_951.mp3 android/app/src/main/res/raw/mixkit_positive_notification_951.mp3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug \
            -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=1g" \
            -Dorg.gradle.daemon=false

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: physio-suai-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  ##############################################################
  # JOB 2 — Build signed release AAB (tags only)
  ##############################################################
  build-release:
    name: Release AAB
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      # webDir="src" — Capacitor reads src/ directly. No Vite build needed.

      - name: Sync Capacitor
        run: npx cap sync android --no-build

      - name: Place google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Copy sound assets to Android res/raw
        run: |
          mkdir -p android/app/src/main/res/raw
          cp src/1774_alarm.mp3 android/app/src/main/res/raw/alarm_1774.mp3
          cp src/mixkit_positive_notification_951.mp3 android/app/src/main/res/raw/mixkit_positive_notification_951.mp3

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE_B64 }}" | base64 --decode > android/app/physio_release.jks

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build release AAB (signed)
        run: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/physio_release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=1g" \
            -Dorg.gradle.daemon=false

      - name: Upload release AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: physio-suai-release-${{ github.ref_name }}
          path: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/mapping/release/mapping.txt
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/bundle/release/app-release.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
