##############################################################
# PHYSIO SUAI — .github/workflows/android.yml
# Debug APK: every push to main/dev
# Release APK + AAB: tags v*
##############################################################

name: Build Physio SUAI Android

on:
  push:
    branches: [ main, dev ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  ##############################################################
  # JOB 1 — Debug APK (every push)
  ##############################################################
  build-debug:
    name: Debug APK
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/')"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=1g"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: physio-suai-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  ##############################################################
  # JOB 2 — Signed Release APK + AAB (tags only)
  ##############################################################
  build-release:
    name: Release APK + AAB
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build & sign release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=1g" \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/physio_release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Build & sign release AAB
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=1g" \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/physio_release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: physio-suai-release-apk-${{ github.ref_name }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: physio-suai-release-aab-${{ github.ref_name }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
