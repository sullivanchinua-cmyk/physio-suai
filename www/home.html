<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>Home - Physio SUAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        .nav-icon {
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        html,body{overflow-x:hidden;max-width:100vw}
        .active-page {
            color: #ec4899;
            border-bottom: 2px solid #ec4899;
        }
        /* When wallpaper is active on chats tab, make containers transparent */
        #mainContent.chat-wallpaper-mode,
        #mainContent.chat-wallpaper-mode > div {
            background: transparent !important;
        }
    </style>
  <style>
    /* ── Mini Music Player ── */
    #miniPlayer {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: linear-gradient(135deg, #0f0a1e, #1a0533);
      border-bottom: 1px solid rgba(167,139,250,.4);
      padding: 8px 14px;
      display: none;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 20px rgba(139,92,246,.3);
    }
    #miniPlayer.visible { display: flex; }
    #miniVinyl {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      background: radial-gradient(circle at 50%, #111 26%, #1a1a2e 27%, #533483 56%, #ec4899 68%, #8b5cf6 78%, #1a1a2e 79%);
      animation: miniSpin 2s linear infinite;
      box-shadow: 0 0 10px rgba(236,72,153,.5);
    }
    #miniPlayer.paused #miniVinyl { animation-play-state: paused; }
    @keyframes miniSpin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}
    #miniPlayerAdjust { transition: padding-top .2s; }
  </style>
  <!-- Firebase FIRST -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <!-- Supabase SECOND -->
  <!-- App -->
  <!-- No aws4fetch needed: upload uses built-in crypto.subtle -->
  <script src="js/hybrid-config.js"></script>
  <script src="js/file-preview.js"></script>
  <script src="js/gemini-chat.js"></script>
  <script src="js/main.js"></script>
  <script src="js/image-viewer.js"></script>
  <script src="js/offline-cache.js"></script>
  <script src="js/features.js"></script>
  <script src="js/attach-menu.js"></script>
  <script src="js/chat-theme.js"></script>
  <script src="js/emoji-panel.js"></script>
  <script src="js/media-viewer.js"></script>
  <script>
  // ── Rich image/video preview (same as classroom chat standalone) ──
function showFilePreview(file, onSend) {
  var ex = document.getElementById('filePreviewOv'); if(ex) ex.remove();
  var _viewOnce = false, _rot = 0, _drawMode = false;
  var _drawCanvas = null, _drawCtx = null, _drawColor = '#ec4899', _drawSize = 5;
  var _overlays = [];  // {el, isEmoji}
  var objUrl = URL.createObjectURL(file);
  var isImg = file.type.startsWith('image/');
  var isVid = file.type.startsWith('video/');
  var vid;

  /* ── Root overlay ── */
  var ov = document.createElement('div');
  ov.id = 'filePreviewOv';
  ov.style.cssText = 'position:fixed;inset:0;z-index:99990;background:#000;display:flex;flex-direction:column;font-family:-apple-system,sans-serif;overscroll-behavior:none';

  /* ── SVG icon helper ── */
  function _svg(path,vb){return '<svg width="22" height="22" viewBox="'+(vb||'0 0 24 24')+'" fill="none" stroke="white" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">'+path+'</svg>';}
  var IC={
    close: _svg('<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>'),
    dl:    _svg('<path d="M12 3v13"/><polyline points="7 11 12 16 17 11"/><line x1="3" y1="21" x2="21" y2="21"/>'),
    rot:   _svg('<path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-5"/>'),
    crop:  _svg('<polyline points="6.5 3 6.5 17.5 21 17.5"/><polyline points="3 6.5 6.5 6.5"/><rect x="10" y="6.5" width="7.5" height="7.5" rx="1"/>'),
    txt:   '<svg width="22" height="22" viewBox="0 0 24 24"><text x="3" y="18" font-size="17" font-weight="900" font-family="Arial" fill="white">T</text></svg>',
    emoji: _svg('<circle cx="12" cy="12" r="9"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><circle cx="9" cy="9.5" r="1" fill="white" stroke="none"/><circle cx="15" cy="9.5" r="1" fill="white" stroke="none"/>'),
    draw:  _svg('<path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/>'),
    spk:   _svg('<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>'),
    mute:  _svg('<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>'),
    hd:    '<svg width="22" height="22" viewBox="0 0 32 22"><text x="1" y="17" font-size="16" font-weight="900" font-family="Arial" fill="white">HD</text></svg>'
  };

  function _mkBtn(id, ico, title) {
    var b = document.createElement('button');
    b.id = id; b.title = title;
    b.style.cssText = 'width:44px;height:44px;background:rgba(255,255,255,.12);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;transition:background .15s,transform .1s';
    b.innerHTML = ico;
    b.addEventListener('touchstart',function(){this.style.transform='scale(.9)';},{passive:true});
    b.addEventListener('touchend',function(){this.style.transform='';},{passive:true});
    return b;
  }

  /* ── TOP TOOLBAR ── */
  var toolbar = document.createElement('div');
  toolbar.style.cssText = 'flex-shrink:0;display:flex;align-items:center;padding:10px 8px;gap:6px;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);';
  var closeBtn = _mkBtn('_fp_close', IC.close, 'Cancel');
  closeBtn.style.background = 'rgba(255,255,255,.08)';
  toolbar.appendChild(closeBtn);
  var sp0 = document.createElement('div'); sp0.style.flex='1'; toolbar.appendChild(sp0);
  toolbar.appendChild(_mkBtn('_fp_dl', IC.dl, 'Save'));
  if(isVid){ toolbar.appendChild(_mkBtn('_fp_mute', IC.spk, 'Mute')); }
  if(isImg){ toolbar.appendChild(_mkBtn('_fp_rot',  IC.rot,  'Rotate')); }
  if(isImg){ toolbar.appendChild(_mkBtn('_fp_crop', IC.crop, 'Crop')); }
  toolbar.appendChild(_mkBtn('_fp_txt',   IC.txt,   'Add text'));
  toolbar.appendChild(_mkBtn('_fp_emoji', IC.emoji, 'Add emoji'));
  toolbar.appendChild(_mkBtn('_fp_draw',  IC.draw,  'Draw'));
  ov.appendChild(toolbar);

  /* ── PREVIEW AREA ── */
  var preview = document.createElement('div');
  preview.id = '_fp_preview';
  preview.style.cssText = 'flex:1;display:flex;align-items:center;justify-content:center;background:#111;position:relative;overflow:hidden';
  ov.appendChild(preview);

  /* ── Overlay container (sits on top of image, same bounds) ── */
  var ovLayer = document.createElement('div');
  ovLayer.id = '_fp_ovLayer';
  ovLayer.style.cssText = 'position:absolute;inset:0;pointer-events:none;z-index:10';
  preview.appendChild(ovLayer);

  /* ── Image / Video ── */
  var imgEl;
  if(isImg){
    imgEl = document.createElement('img');
    imgEl.id = '_fp_img';
    imgEl.style.cssText = 'max-width:100%;max-height:100%;object-fit:contain;display:block;transition:transform .3s;pointer-events:none';
    imgEl.src = objUrl;
    preview.insertBefore(imgEl, ovLayer);
    imgEl.onload = function(){
      // Sync ovLayer to exact rendered image bounds
      var r = imgEl.getBoundingClientRect(), pr = preview.getBoundingClientRect();
      ovLayer.style.left   = (r.left  - pr.left)  + 'px';
      ovLayer.style.top    = (r.top   - pr.top)   + 'px';
      ovLayer.style.width  = r.width  + 'px';
      ovLayer.style.height = r.height + 'px';
    };
    window.addEventListener('resize', function(){ if(!imgEl) return;
      var r=imgEl.getBoundingClientRect(),pr=preview.getBoundingClientRect();
      ovLayer.style.left=(r.left-pr.left)+'px';ovLayer.style.top=(r.top-pr.top)+'px';
      ovLayer.style.width=r.width+'px';ovLayer.style.height=r.height+'px';
    });
  } else if(isVid){
    vid = document.createElement('video');
    vid.style.cssText = 'max-width:100%;max-height:100%;object-fit:contain;display:block';
    vid.muted=false; vid.src=objUrl; vid.playsInline=true;
    var playOvl = document.createElement('div');
    playOvl.style.cssText='position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:5;cursor:pointer';
    playOvl.innerHTML='<div style="width:60px;height:60px;border-radius:50%;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)"><svg width="24" height="24" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>';
    playOvl.onclick=function(){vid.paused?vid.play():vid.pause();};
    vid.onplay=function(){playOvl.style.display='none';};
    vid.onpause=function(){playOvl.style.display='flex';};
    preview.insertBefore(vid, ovLayer);
    preview.insertBefore(playOvl, ovLayer);
  } else {
    var docBox = document.createElement('div');
    docBox.style.cssText='padding:30px 20px;text-align:center;color:#fff';
    docBox.innerHTML='<div style="font-size:48px">📄</div><div style="font-size:14px;margin-top:8px;color:#9ca3af">'+file.name+'</div>';
    preview.insertBefore(docBox, ovLayer);
  }

  /* ── FILMSTRIP for video ── */
  if(isVid){
    var strip = document.createElement('div');
    strip.id = '_fp_strip';
    strip.style.cssText='flex-shrink:0;display:flex;gap:3px;padding:6px 8px;background:#000;overflow-x:auto;-webkit-overflow-scrolling:touch;min-height:52px;align-items:center';
    strip.innerHTML='<span style="color:#4b5563;font-size:12px;padding:0 8px">Loading frames…</span>';
    ov.appendChild(strip);
    if(vid) vid.addEventListener('loadedmetadata',function(){
      var dur=vid.duration; if(!dur||dur>300){strip.innerHTML='';return;}
      strip.innerHTML='';
      var count=Math.min(Math.round(dur),9);
      var cvs2=document.createElement('canvas');cvs2.width=60;cvs2.height=40;
      var ctx2=cvs2.getContext('2d');
      (function _nf(i){if(i>=count)return;
        var tv=document.createElement('video');tv.src=objUrl;tv.muted=true;
        tv.onloadedmetadata=function(){tv.currentTime=(i/count)*dur;};
        tv.onseeked=function(){try{ctx2.drawImage(tv,0,0,60,40);
          var thumb=document.createElement('div');
          thumb.style.cssText='width:54px;height:40px;flex-shrink:0;border-radius:5px;overflow:hidden;cursor:pointer;border:2px solid transparent';
          thumb.innerHTML='<img src="'+cvs2.toDataURL()+'" style="width:100%;height:100%;object-fit:cover">';
          thumb.onclick=function(){if(vid)vid.currentTime=(i/count)*dur;};
          strip.appendChild(thumb);
        }catch(e){}
        _nf(i+1);};
        tv.load();
      })(0);
    });
  }

  /* ── CAPTION + SEND BAR ── */
  var capBar = document.createElement('div');
  capBar.id = '_fp_botBar';
  capBar.style.cssText='flex-shrink:0;display:flex;flex-direction:column;background:rgba(0,0,0,.75);backdrop-filter:blur(12px)';
  var capRow = document.createElement('div');
  capRow.style.cssText='display:flex;align-items:center;gap:10px;padding:10px 12px 14px';
  var voBtn = document.createElement('button');
  voBtn.id='_fp_vo';
  voBtn.style.cssText='width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.1);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent';
  voBtn.innerHTML='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  voBtn.title='View once';
  var capInput = document.createElement('input');
  capInput.placeholder='Add a caption…';
  capInput.style.cssText='flex:1;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:24px;padding:10px 16px;color:#fff;font-size:14px;outline:none;caret-color:#ec4899;font-family:inherit';
  var sendBtn = document.createElement('button');
  sendBtn.style.cssText='width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#9333ea,#ec4899);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;box-shadow:0 4px 16px rgba(147,51,234,.4)';
  sendBtn.innerHTML='<svg width="20" height="20" viewBox="0 0 24 24" fill="white"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
  capRow.appendChild(voBtn); capRow.appendChild(capInput); capRow.appendChild(sendBtn);
  capBar.appendChild(capRow);
  ov.appendChild(capBar);

  document.body.appendChild(ov);

  /* ── BUTTON ACTIONS ── */
  function _closeAll(){
    ['_fp_drawBar','_fp_txtPanel','_fp_emoPanel','_fp_cropOv'].forEach(function(id){var e=document.getElementById(id);if(e)e.remove();});
  }
  closeBtn.onclick = function(){_closeAll();URL.revokeObjectURL(objUrl);ov.remove();};

  document.getElementById('_fp_dl').onclick=function(){
    var a=document.createElement('a');a.href=objUrl;a.download=file.name||'file';document.body.appendChild(a);a.click();setTimeout(function(){a.remove();},500);
  };

  /* Mute (video) */
  if(isVid){
    var _muted=false;
    document.getElementById('_fp_mute').onclick=function(){
      _muted=!_muted; if(vid)vid.muted=_muted;
      this.innerHTML=_muted?IC.mute:IC.spk;
      this.style.background=_muted?'linear-gradient(135deg,#9333ea,#ec4899)':'rgba(255,255,255,.12)';
    };
  }

  /* Rotate (image) */
  if(isImg){
    document.getElementById('_fp_rot').onclick=function(){
      _rot=(_rot+90)%360;
      if(imgEl) imgEl.style.transform='rotate('+_rot+'deg)';
    };
  }

  /* ── CROP (image) — instant interactive ── */
  if(isImg){
    var _cropActive=false;
    document.getElementById('_fp_crop').onclick=function(){
      if(_cropActive){ _applyCrop(); return; }
      _cropActive=true;
      document.getElementById('_fp_crop').style.background='linear-gradient(135deg,#9333ea,#ec4899)';
      var imgR=imgEl.getBoundingClientRect(), pr=preview.getBoundingClientRect();
      // Crop frame (positioned relative to preview)
      var cOv=document.createElement('div');cOv.id='_fp_cropOv';
      cOv.style.cssText='position:absolute;left:'+(imgR.left-pr.left)+'px;top:'+(imgR.top-pr.top)+'px;width:'+imgR.width+'px;height:'+imgR.height+'px;z-index:30;touch-action:none';
      // Dark masks
      var masks=['top','bottom','left','right'];
      masks.forEach(function(s){var m=document.createElement('div');m.setAttribute('data-m',s);m.style.cssText='position:absolute;background:rgba(0,0,0,.55);pointer-events:none;';cOv.appendChild(m);});
      // Crop box
      var box=document.createElement('div');box.id='_fp_cropBox';
      box.style.cssText='position:absolute;border:2px solid #fff;box-sizing:border-box;z-index:2;cursor:move;touch-action:none';
      // Start at 15% inset
      var bx=imgR.width*0.15,by=imgR.height*0.15,bw=imgR.width*0.7,bh=imgR.height*0.7;
      function _setBox(x,y,w,h){
        bx=Math.max(0,Math.min(x,imgR.width-20));
        by=Math.max(0,Math.min(y,imgR.height-20));
        bw=Math.max(20,Math.min(w,imgR.width-bx));
        bh=Math.max(20,Math.min(h,imgR.height-by));
        box.style.left=bx+'px';box.style.top=by+'px';box.style.width=bw+'px';box.style.height=bh+'px';
        // Update masks
        var mTop=cOv.querySelector('[data-m=top]'),mBot=cOv.querySelector('[data-m=bottom]'),mLft=cOv.querySelector('[data-m=left]'),mRgt=cOv.querySelector('[data-m=right]');
        if(mTop){mTop.style.cssText='position:absolute;background:rgba(0,0,0,.55);pointer-events:none;left:0;top:0;right:0;height:'+by+'px';}
        if(mBot){mBot.style.cssText='position:absolute;background:rgba(0,0,0,.55);pointer-events:none;left:0;bottom:0;right:0;height:'+(imgR.height-by-bh)+'px';}
        if(mLft){mLft.style.cssText='position:absolute;background:rgba(0,0,0,.55);pointer-events:none;left:0;top:'+by+'px;width:'+bx+'px;height:'+bh+'px';}
        if(mRgt){mRgt.style.cssText='position:absolute;background:rgba(0,0,0,.55);pointer-events:none;right:0;top:'+by+'px;width:'+(imgR.width-bx-bw)+'px;height:'+bh+'px';}
      }
      _setBox(bx,by,bw,bh);
      // Corner handles
      [['nw','left:0;top:0;cursor:nw-resize'],['ne','right:0;top:0;cursor:ne-resize'],['sw','left:0;bottom:0;cursor:sw-resize'],['se','right:0;bottom:0;cursor:se-resize']].forEach(function(hd){
        var h=document.createElement('div');h.setAttribute('data-h',hd[0]);
        h.style.cssText='position:absolute;width:20px;height:20px;background:#ec4899;border-radius:50%;z-index:4;touch-action:none;'+hd[1];
        var _s=false,_sx,_sy,_sbx,_sby,_sbw,_sbh;
        function _hs(e){e.stopPropagation();e.preventDefault();_s=true;var t=e.touches?e.touches[0]:e;_sx=t.clientX;_sy=t.clientY;_sbx=bx;_sby=by;_sbw=bw;_sbh=bh;}
        function _hm(e){e.stopPropagation();e.preventDefault();if(!_s)return;var t=e.touches?e.touches[0]:e;var dx=t.clientX-_sx,dy=t.clientY-_sy;
          var corner=hd[0];
          var nx=_sbx,ny=_sby,nw=_sbw,nh=_sbh;
          if(corner==='nw'){nx=_sbx+dx;ny=_sby+dy;nw=_sbw-dx;nh=_sbh-dy;}
          else if(corner==='ne'){nw=_sbw+dx;ny=_sby+dy;nh=_sbh-dy;}
          else if(corner==='sw'){nx=_sbx+dx;nw=_sbw-dx;nh=_sbh+dy;}
          else{nw=_sbw+dx;nh=_sbh+dy;}
          _setBox(nx,ny,nw,nh);
        }
        function _he(){_s=false;}
        h.addEventListener('touchstart',_hs,{passive:false});h.addEventListener('touchmove',_hm,{passive:false});h.addEventListener('touchend',_he);
        h.addEventListener('mousedown',_hs);document.addEventListener('mousemove',function(e){if(_s)_hm(e);});document.addEventListener('mouseup',_he);
        box.appendChild(h);
      });
      // Rule-of-thirds grid lines
      var grid=document.createElement('div');
      grid.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:3';
      grid.innerHTML='<div style="position:absolute;left:33.3%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.3)"></div><div style="position:absolute;left:66.6%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.3)"></div><div style="position:absolute;top:33.3%;left:0;right:0;height:1px;background:rgba(255,255,255,.3)"></div><div style="position:absolute;top:66.6%;left:0;right:0;height:1px;background:rgba(255,255,255,.3)"></div>';
      box.appendChild(grid);
      // Drag box to move
      var _dm=false,_dx,_dy,_dbx,_dby;
      box.addEventListener('touchstart',function(e){_dm=true;var t=e.touches[0];_dx=t.clientX;_dy=t.clientY;_dbx=bx;_dby=by;},{passive:false});
      box.addEventListener('touchmove',function(e){e.preventDefault();if(!_dm)return;var t=e.touches[0];_setBox(_dbx+(t.clientX-_dx),_dby+(t.clientY-_dy),bw,bh);},{passive:false});
      box.addEventListener('touchend',function(){_dm=false;},{passive:false});
      // Apply button
      var applyBtn=document.createElement('button');
      applyBtn.textContent='✓ Crop';
      applyBtn.style.cssText='position:absolute;bottom:-44px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#9333ea,#ec4899);border:none;border-radius:14px;color:#fff;font-weight:800;font-size:14px;padding:8px 24px;cursor:pointer;white-space:nowrap;z-index:5;-webkit-tap-highlight-color:transparent;box-shadow:0 4px 14px rgba(147,51,234,.5)';
      function _doApply(e){if(e)e.preventDefault();_applyCrop();}
      applyBtn.addEventListener('touchend',_doApply,{passive:false});
      applyBtn.addEventListener('click',_doApply);
      box.appendChild(applyBtn);
      cOv.appendChild(box);
      preview.appendChild(cOv);

      function _applyCrop(){
        _cropActive=false;
        document.getElementById('_fp_crop').style.background='rgba(255,255,255,.12)';
        var cropOvEl=document.getElementById('_fp_cropOv');if(cropOvEl)cropOvEl.remove();
        // Apply to image using canvas
        var scaleX=imgEl.naturalWidth/imgR.width, scaleY=imgEl.naturalHeight/imgR.height;
        var cx=Math.round(bx*scaleX),cy=Math.round(by*scaleY),cw=Math.round(bw*scaleX),ch=Math.round(bh*scaleY);
        cw=Math.min(cw,imgEl.naturalWidth-cx); ch=Math.min(ch,imgEl.naturalHeight-cy);
        if(cw<4||ch<4) return;
        var c3=document.createElement('canvas');c3.width=cw;c3.height=ch;
        c3.getContext('2d').drawImage(imgEl,cx,cy,cw,ch,0,0,cw,ch);
        imgEl.src=c3.toDataURL('image/jpeg',0.95);
        imgEl.style.transform='';_rot=0;
        // Reposition ovLayer after image reloads
        imgEl.onload=function(){
          var r=imgEl.getBoundingClientRect(),pr=preview.getBoundingClientRect();

              ctx4.fillText(sp.textContent,rx+4,ry);
            } else {
              ctx4.font='bold '+scaledFs+'px Arial,sans-serif';
              ctx4.fillStyle=sp.style.color||'#fff';
              ctx4.shadowBlur=10;ctx4.shadowColor='rgba(0,0,0,.9)';
              ctx4.textBaseline='top';
              ctx4.fillText(sp.textContent,rx+4,ry);
              ctx4.shadowBlur=0;
            }
            if(ctrl)ctrl.style.display='';
          });
          c4.toBlob(function(blob){
            if(!blob){URL.revokeObjectURL(objUrl);ov.remove();onSend(file,cap,_viewOnce);return;}
            var flat=new File([blob],file.name||'image.jpg',{type:'image/jpeg',lastModified:Date.now()});
            URL.revokeObjectURL(objUrl);ov.remove();onSend(flat,cap,_viewOnce);
          },'image/jpeg',0.93);
          return;
        }catch(err){console.warn('composite failed:',err);}
      }
    }
    URL.revokeObjectURL(objUrl);ov.remove();onSend(file,cap,_viewOnce);
  };
  capInput.addEventListener('keydown',function(e){if(e.key==='Enter')sendBtn.click();});
  setTimeout(function(){capInput.focus();},350);
}
  </script>
</head>

            <p class="loading-text text-white font-semibold">Loading...</p>
        </div>
    </div>
    <!-- Firebase for Auth + Database -->
    <script>
        // ── Non-blocking send pill (replaces big overlay for chat sends) ──
        function showSendPill(label) {
          var ex = document.getElementById('_homeSendPill');
          if (ex) { ex.querySelector('._hspTxt').textContent = label || 'Sending…'; return; }
          var d = document.createElement('div'); d.id = '_homeSendPill';
          d.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9990;background:rgba(15,20,30,.9);border-radius:24px;padding:8px 18px 8px 12px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,.6);pointer-events:none;backdrop-filter:blur(8px)';
          d.innerHTML = '<div style="width:20px;height:20px;border:2.5px solid #9333ea;border-top-color:#ec4899;border-radius:50%;animation:spin 0.9s linear infinite;flex-shrink:0"></div><span class="_hspTxt" style="color:#e9edef;font-size:13px;font-weight:600;white-space:nowrap">' + (label || 'Sending…') + '</span>';
          document.body.appendChild(d);
        }
        function hideSendPill() { var d = document.getElementById('_homeSendPill'); if (d) d.remove(); }

        // Check auth - use user.uid directly to avoid race with hybrid-config.js
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                // Firebase briefly fires null before restoring persisted auth on Android/WebView.
                // Guard: if we just came from a successful login, wait up to 8 s before giving up.
                if (window._homeAuthGuardPending) return;
                window._homeAuthGuardPending = true;
                var _waitMs = localStorage.getItem('_physio_authed') ? 8000 : 4000;
                setTimeout(function() {
                    window._homeAuthGuardPending = false;
                    if (!firebase.auth().currentUser) {
                        localStorage.removeItem('_physio_authed');
                        window.location.href = 'index.html';
                    }
                }, _waitMs);
                return;
            }
            window._homeAuthGuardPending = false;
            localStorage.removeItem('_physio_authed');
            // Pass uid directly - don't rely on global currentUser being set yet
            const profile = await getUserProfile(user.uid);
            if (profile && profile.name) {
                document.getElementById('profileInitial').textContent = profile.name[0].toUpperCase();
                if (profile.photoURL) {
                    var btn = document.getElementById('profileNavBtn');
                    if (btn) { btn.innerHTML = '<img src="'+profile.photoURL+'" class="w-full h-full object-cover rounded-full" onerror="this.parentElement.innerHTML=\'<span>'+profile.name[0].toUpperCase()+'</span>\'">'; }
                }
            }

            // ── Offline banner + cached message fallback ──────────────────────
            (function() {
              var _banner = null;
              function _showBanner(online) {
                if (!_banner) {
                  _banner = document.createElement('div');
                  _banner.id = '_offlineBanner';
                  _banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;text-align:center;font-size:13px;font-weight:600;padding:7px 16px;transition:all .3s;pointer-events:none';
                  document.body.appendChild(_banner);
                }
                if (online) {
                  _banner.style.background = 'rgba(16,185,129,.9)';
                  _banner.style.color = '#fff';
                  _banner.textContent = '✅ Back online';
                  setTimeout(function(){ _banner.style.display = 'none'; }, 2500);
                } else {
                  _banner.style.display = '';
                  _banner.style.background = 'rgba(239,68,68,.9)';
                  _banner.style.color = '#fff';
                  _banner.textContent = '📵 You\'re offline — showing cached messages';
                }
              }

              if (typeof OfflineCache !== 'undefined') {
                OfflineCache.onConnChange(function(online) {
                  _showBanner(online);
                  if (online) {
                    // Firebase will automatically re-sync, so nothing extra needed
                  } else {
                    // Load from IDB and render
                    var container = document.getElementById('chatMessages');
                    if (!container) return;
                    OfflineCache.getMsgs('public_chat', 100).then(function(msgs) {
                      if (!msgs || !msgs.length) return;
                      // Only show cached if container is empty (firebase hasn't loaded)
                      if (container.children.length > 0) return;
                      container.innerHTML = '';
                      msgs.forEach(function(m) {
                        if (typeof renderPublicMsg === 'function') renderPublicMsg(m, container);
                      });
                      // Scroll to bottom
                      var scroll = container.closest('[style*="overflow"]') || container.parentElement;
                      if (scroll) scroll.scrollTop = scroll.scrollHeight;
                    });
                  }
                });

                // Initial offline check
                if (!OfflineCache.isOnline()) {
                  setTimeout(function(){ _showBanner(false); }, 500);
                }
              }
            })();

            // ── Init chat theme for classroom ────────────────────────────────
            if (typeof initChatTheme === 'function') initChatTheme('public_chat');

            // ── @mention notifications ────────────────────────────────────────
            db.ref('notifications/' + user.uid).orderByChild('read').equalTo(false).once('value').then(function(snap) {
              if (!snap.exists()) return;
              var notifs = [];
              snap.forEach(function(c) { notifs.push({key: c.key, val: c.val()}); });
              if (!notifs.length) return;
              // Show the most recent unread mention
              var latest = notifs[notifs.length - 1].val;
              if (latest && latest.type === 'mention') {
                setTimeout(function() {
                  showMentionNotif(latest.from, latest.message, function() {
                    // Mark all as read
                    notifs.forEach(function(n) {
                      db.ref('notifications/' + user.uid + '/' + n.key + '/read').set(true);
                    });
                  }, latest.msgText);
                }, 1500);
              }
            });

            // ── Bell: full notification centre ────────────────────────────
            var _bellData = { private:{}, classroom:0, funjokes:0, mentions:[] };
            var _bellLastSeen = { classroom: parseInt(localStorage.getItem('_bellSeenClass')||'0'),
                                  funjokes:  parseInt(localStorage.getItem('_bellSeenFj')||'0') };

            function _bellRefresh() {
              var bellCount = document.getElementById('notifCount');
              var bellBtn   = document.getElementById('notifBell');
              var total = Object.values(_bellData.private).reduce(function(a,v){return a+v.count;},0)
                        + _bellData.classroom + _bellData.funjokes + _bellData.mentions.length;
              if (total > 0) {
                if (bellCount) { bellCount.textContent = total > 99 ? '99+' : total; bellCount.style.display = 'flex'; }
                if (bellBtn)   bellBtn.style.background = 'linear-gradient(135deg,#9333ea,#ec4899)';
              } else {
                if (bellCount) bellCount.style.display = 'none';
                if (bellBtn)   bellBtn.style.background = '';
              }
            }

            // Watch private E2EE chats
            db.ref('users').once('value').then(function(snap) {
              snap.forEach(function(c) {
                var uid = c.key; if (uid === user.uid) return;
                var name = (c.val()&&c.val().name) ? c.val().name : uid.substring(0,8);
                var chatId = [user.uid, uid].sort().join('_');
                db.ref('chats/'+chatId).orderByChild('read').equalTo(false).on('value', function(s) {
                  var cnt = 0;
                  s.forEach(function(m){ var v=m.val(); if(v&&v.senderUid&&v.senderUid!==user.uid) cnt++; });
                  if (cnt > 0) _bellData.private[uid] = { count:cnt, name:name, chatId:chatId };
                  else delete _bellData.private[uid];
                  _bellRefresh();
                });
              });
            }).catch(function(){});

            // Watch classroom chat for new messages since last seen
            db.ref('public_chat').orderByChild('timestamp').startAt(_bellLastSeen.classroom + 1).on('value', function(s) {
              var cnt = 0;
              s.forEach(function(c){ var v=c.val(); if(v&&v.senderUid&&v.senderUid!==user.uid) cnt++; });
              _bellData.classroom = cnt;
              _bellRefresh();
            });

            // Watch fun_chat for new messages since last seen
            db.ref('fun_chat').orderByChild('ts').startAt(_bellLastSeen.funjokes + 1).on('value', function(s) {
              var cnt = 0;
              s.forEach(function(c){ var v=c.val(); if(v&&v.sessionId) cnt++; });
              _bellData.funjokes = cnt;
              _bellRefresh();
            });

            // Watch mentions
            db.ref('notifications/'+user.uid).orderByChild('read').equalTo(false).on('value', function(s) {
              _bellData.mentions = [];
              s.forEach(function(c){ var v=c.val(); if(v) _bellData.mentions.push({key:c.key,val:v}); });
              _bellRefresh();
            });

            // ── Bell tap → show notification sheet ────────────────────────
            window.showNotifications = function() {
              var ex = document.getElementById('_notifPage'); if (ex) { ex.remove(); return; }

              window.closeNotifPage = function() {
                var p = document.getElementById('_notifPage'); if (p) p.remove();
              };
              window._notifGoClass = function() {
                closeNotifPage();
                localStorage.setItem('_bellSeenClass', Date.now());
                _bellData.classroom = 0; _bellRefresh();
                loadPage('home');
                setTimeout(function(){ var mc=document.getElementById('chatMessages'); if(mc) mc.scrollTop=mc.scrollHeight; }, 500);
              };
              window._notifGoFj = function() {
                closeNotifPage();
                localStorage.setItem('_bellSeenFj', Date.now());
                _bellData.funjokes = 0; _bellRefresh();
                window.location.href = 'pages/funjokes.html';
              };
              window._notifGoChat = function(cId) {
                closeNotifPage();
                window.location.href = 'pages/chat.html?open=' + cId;
              };
              window._notifGoMention = function(uid, key) {
                closeNotifPage();
                db.ref('notifications/' + uid + '/' + key + '/read').set(true);
                loadPage('home');
                setTimeout(function(){ var c=document.getElementById('chatMessages')||document.getElementById('msgs'); if(c) c.scrollTop=c.scrollHeight; }, 400);
              };
              window._notifMarkAll = function() {
                _bellData = {private:{}, classroom:0, funjokes:0, mentions:[]};
                localStorage.setItem('_bellSeenClass', Date.now());
                localStorage.setItem('_bellSeenFj', Date.now());
                _bellRefresh();
                closeNotifPage();
              };

              var rows = '';
              _bellData.mentions.forEach(function(n) {
                var v = n.val;
                var label = v.type==='mention'
                  ? '<b>' + (v.from||'Someone') + '</b> tagged you'
                  : '<b>' + (v.from||'Someone') + '</b> replied to your message';
                var sub = v.msgText ? '\u201c' + String(v.msgText).substring(0,45) + (v.msgText.length>45?'\u2026':'') + '\u201d' : '';
                var uid = user.uid, key = n.key;
                rows += '<div onclick="_notifGoMention(\'' + uid + '\',\'' + key + '\')" style="display:flex;align-items:flex-start;gap:14px;background:rgba(236,72,153,.1);border:1px solid rgba(236,72,153,.25);border-radius:18px;padding:16px;margin-bottom:12px;cursor:pointer">' +
                  '<div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#ec4899,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">💬</div>' +
                  '<div style="flex:1;min-width:0"><div style="color:#f9a8d4;font-size:14px;font-weight:700;line-height:1.5">' + label + '</div>' +
                  (sub ? '<div style="color:#9ca3af;font-size:12px;margin-top:4px">' + sub + '</div>' : '') +
                  '<div style="color:#6b7280;font-size:11px;margin-top:5px">↗ Tap to jump to message</div></div>' +
                  '</div>';
              });
              if (_bellData.classroom > 0) {
                var cnt = _bellData.classroom;
                rows += '<div onclick="_notifGoClass()" style="display:flex;align-items:center;gap:14px;background:#0d1929;border:1px solid #1a3a5c;border-radius:18px;padding:16px;margin-bottom:12px;cursor:pointer">' +
                  '<div style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">🏫</div>' +
                  '<div style="flex:1"><div style="color:#fff;font-size:15px;font-weight:800">Classroom Chat</div><div style="color:#60a5fa;font-size:13px;margin-top:4px">' + cnt + ' new message' + (cnt!==1?'s':'') + ' waiting</div></div>' +
                  '<div style="background:#3b82f6;border-radius:14px;padding:5px 12px;font-size:14px;font-weight:800;color:#fff;flex-shrink:0">' + (cnt>99?'99+':cnt) + '</div>' +
                  '</div>';
              }
              if (_bellData.funjokes > 0) {
                var cnt2 = _bellData.funjokes;
                rows += '<div onclick="_notifGoFj()" style="display:flex;align-items:center;gap:14px;background:#1a0e00;border:1px solid #3d2600;border-radius:18px;padding:16px;margin-bottom:12px;cursor:pointer">' +
                  '<div style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#ef4444);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">😂</div>' +
                  '<div style="flex:1"><div style="color:#fff;font-size:15px;font-weight:800">Fun Jokes</div><div style="color:#fbbf24;font-size:13px;margin-top:4px">' + cnt2 + ' new message' + (cnt2!==1?'s':'') + ' waiting</div></div>' +
                  '<div style="background:#f59e0b;border-radius:14px;padding:5px 12px;font-size:14px;font-weight:800;color:#000;flex-shrink:0">' + (cnt2>99?'99+':cnt2) + '</div>' +
                  '</div>';
              }
              Object.values(_bellData.private).forEach(function(p) {
                var cId = p.chatId;
                rows += '<div onclick="_notifGoChat(\'' + cId + '\')" style="display:flex;align-items:center;gap:14px;background:#001a0e;border:1px solid #003820;border-radius:18px;padding:16px;margin-bottom:12px;cursor:pointer">' +
                  '<div style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#10b981,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">🔒</div>' +
                  '<div style="flex:1"><div style="color:#fff;font-size:15px;font-weight:800">' + p.name + '</div><div style="color:#34d399;font-size:13px;margin-top:4px">' + p.count + ' unread message' + (p.count!==1?'s':'') + '</div></div>' +
                  '<div style="background:#10b981;border-radius:14px;padding:5px 12px;font-size:14px;font-weight:800;color:#fff;flex-shrink:0">' + (p.count>99?'99+':p.count) + '</div>' +
                  '</div>';
              });

              var hasAny = _bellData.classroom > 0 || _bellData.funjokes > 0
                        || Object.keys(_bellData.private).length > 0 || _bellData.mentions.length > 0;

              if (!document.getElementById('_nPageKf')) {
                var _nkf = document.createElement('style'); _nkf.id = '_nPageKf';
                _nkf.textContent = '@keyframes _nPageIn{from{transform:translateY(100%)}to{transform:translateY(0)}}';
                document.head.appendChild(_nkf);
              }

              var pg = document.createElement('div');
              pg.id = '_notifPage';
              pg.style.cssText = 'position:fixed;inset:0;z-index:9990;background:#0d1117;display:flex;flex-direction:column;font-family:-apple-system,sans-serif;animation:_nPageIn .28s cubic-bezier(.25,.46,.45,.94) both';
              pg.innerHTML =
                '<div style="display:flex;align-items:center;gap:12px;padding:14px 14px 12px;border-bottom:1px solid #1f2937;flex-shrink:0">' +
                  '<button onclick="closeNotifPage()" style="background:#1f2937;border:none;border-radius:50%;width:42px;height:42px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">\u2190</button>' +
                  '<div style="flex:1"><div style="font-size:20px;font-weight:900;color:#fff">\uD83D\uDD14 Notifications</div><div style="font-size:12px;color:#6b7280;margin-top:2px">' + (hasAny ? 'Tap any item to open' : 'No new notifications') + '</div></div>' +
                  (hasAny ? '<button onclick="_notifMarkAll()" style="background:transparent;border:1px solid #374151;border-radius:20px;padding:7px 13px;color:#9ca3af;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0">Mark all read</button>' : '') +

          row2.appendChild(prevBtn);
          row2.appendChild(nextBtn);

          bar.appendChild(row1);
          bar.appendChild(row2);
          document.body.appendChild(bar);

          var _matches = [];
          var _cur = -1;

          function _clearSearchHighlights() {
            document.querySelectorAll('._srchHL').forEach(function(el) {
              var parent = el.parentNode;
              if (parent) parent.replaceChild(document.createTextNode(el.textContent), el);
            });
            var msgs = document.getElementById('chatMessages');
            if (msgs) msgs.normalize();
          }

          // Make it accessible from cancel
          window._clearSearchHighlights = _clearSearchHighlights;

          function _doSearch(q) {
            _clearSearchHighlights();
            _matches = [];
            _cur = -1;
            navInfo.style.color = '#8696a0';
            if (!q || q.trim().length < 2) {
              navInfo.textContent = q.length > 0 ? 'Keep typing…' : 'Type to search all messages';
              return;
            }

            var ql = q.toLowerCase();
            var msgs = document.getElementById('chatMessages');
            if (!msgs) return;

            var walker = document.createTreeWalker(msgs, NodeFilter.SHOW_TEXT, null, false);
            var node;
            var nodesToHighlight = [];
            while ((node = walker.nextNode())) {
              if ((node.nodeValue || '').toLowerCase().includes(ql)) {
                nodesToHighlight.push(node);
              }
            }

            nodesToHighlight.forEach(function(node) {
              var text = node.nodeValue;
              var parent = node.parentNode;
              if (!parent) return;
              var parts = text.split(new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi'));
              var frag = document.createDocumentFragment();
              parts.forEach(function(part) {
                if (part.toLowerCase() === ql) {
                  var span = document.createElement('span');
                  span.className = '_srchHL';
                  span.style.cssText = 'background:linear-gradient(135deg,#9333ea,#ec4899);color:#fff;border-radius:4px;padding:0 3px';
                  span.textContent = part;
                  frag.appendChild(span);
                  _matches.push(span);
                } else {
                  frag.appendChild(document.createTextNode(part));
                }
              });
              parent.replaceChild(frag, node);
            });

            if (_matches.length > 0) {
              navInfo.textContent = '1 of ' + _matches.length + ' result' + (_matches.length===1?'':'s');
              navInfo.style.color = '#34d399';
              _cur = 0;
              _scrollToMatch(0);
            } else {
              navInfo.textContent = 'No results for "' + q + '"';
              navInfo.style.color = '#f87171';
            }
          }

          function _scrollToMatch(idx) {
            if (!_matches.length) return;
            _matches.forEach(function(m, i) {
              m.style.background = i === idx
                ? 'linear-gradient(135deg,#f59e0b,#ec4899)'
                : 'linear-gradient(135deg,#9333ea,#ec4899)';
            });
            _matches[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
            navInfo.textContent = (idx+1) + ' of ' + _matches.length + ' result' + (_matches.length===1?'':'s');
            navInfo.style.color = '#34d399';
            _cur = idx;
          }

          var _timer;
          inp.addEventListener('input', function() {
            clearInp.style.display = inp.value ? 'block' : 'none';
            clearTimeout(_timer);
            _timer = setTimeout(function() { _doSearch(inp.value); }, 300);
          });

          nextBtn.onclick = function() {
            if (!_matches.length) return;
            _scrollToMatch((_cur + 1) % _matches.length);
          };
          prevBtn.onclick = function() {
            if (!_matches.length) return;
            _scrollToMatch((_cur - 1 + _matches.length) % _matches.length);
          };

          // Focus input after animation
          setTimeout(function() { inp.focus(); }, 120);
        }

        function loadMusicProxy(key, s) {

              .then(function(r){ if(!r.ok) throw new Error(r.status); return r.text(); })
              .then(function(html){
                var base = s.url.match(/^(https?:\/\/[^/]+)/)[1];
                var patched = html
                  .replace(/<head([^>]*)>/i, '<head$1><base href="' + base + '/">')
                  .replace(/top\.location(\s*=|\s*\.href\s*=)/g, '//B=')
                  .replace(/window\.top\s*!==?\s*window(?:\.self)?/g, 'false')
                  .replace(/if\s*\(\s*(?:top|window\.top)\s*!={1,2}\s*(?:self|window(?:\.self)?)\s*\)/g, 'if(false)');
                var bgFrame = document.getElementById('bgMusicFrame');
                var frame = document.getElementById('musicFrame');
                if (!frame) return;
                bgFrame.srcdoc = patched;
                frame.srcdoc = patched;
                frame.style.display = 'block';
                frame.style.flex = '1';
                _bgMusicLoaded = true;
                var lo = document.getElementById('musicLoading');
                if (lo) lo.style.display = 'none';
                if (s) miniShowBar(s.name, s.icon + ' Now Playing');

        function onHomeAttach(file, type, extra) {
            // type === 'text+file' means file came with a caption from preview
            if (type === 'text+file' && file) {
                currentChatFile = file;
                window._homePendingText = extra || null;
                var strip = document.getElementById('homeFileStrip');
                var nameEl = document.getElementById('homeFileName');
                if (strip && nameEl) { nameEl.textContent = (extra ? extra + ' · ' : '') + file.name; strip.style.display = 'block'; }
                updateHomeMicSend();
                // Auto-send immediately (preview already confirmed by user)
                sendChatMessage();
                return;
            }
            if (type === 'text' || (!file && extra)) {
                currentChatFile = null;
                var strip = document.getElementById('homeFileStrip');
                var nameEl = document.getElementById('homeFileName');
                if (strip && nameEl) { nameEl.textContent = extra?extra.substring(0,50):type; strip.style.display = 'block'; }
                window._homePendingText = extra || type;
                updateHomeMicSend();
                return;
            }
            if (!file) return;
            // Show WhatsApp preview for images/videos; for other files just queue
            if (typeof showFilePreview === 'function' && (file.type.startsWith('image/') || file.type.startsWith('video/'))) {
                showFilePreview(file, function(f, caption, viewOnce) {
                    currentChatFile = f;

                        if (th) { var u = URL.createObjectURL(f); th.src = u; }
                        if (nm) nm.textContent = f.name;
                        if (sz) sz.textContent = (f.size > 1048576 ? (f.size/1048576).toFixed(1)+' MB' : (f.size/1024).toFixed(0)+' KB') + (viewOnce ? ' · View once' : '');

                        var ic2 = document.getElementById('homeFsIco');

            updateHomeMicSend();

        function _hmSbEnd(e){
          clearTimeout(_hmSbTimer);
          if(_hmSbFired){ _hmSbFired=false; return; }
          var hasContent=updateHomeMicSendState();
          if(hasContent){ _hmVoMode?_hmSendVO():sendChatMessage(); }
          else { if(typeof WaEmojiPanel!=='undefined') WaEmojiPanel.openVoiceSheet(); }
        }
        function _hmSbCancel(){ clearTimeout(_hmSbTimer); _hmSbFired=false; }
        function updateHomeMicSendState() {
            var inp=document.getElementById('chatInput');
            return (inp&&inp.value.trim().length>0)||!!currentChatFile||!!window._homePendingText;
        }
        function _hmToggleVO(){
          _hmVoMode=!_hmVoMode;
          if(navigator.vibrate) navigator.vibrate(40);
          _hmUpdateBtn();
        }
        function _hmUpdateBtn(){
          var btn=document.getElementById('homeMicSendBtn');
          var mic=document.getElementById('homeMicSVG'), send=document.getElementById('homeSendSVG');
          var voOnce=document.getElementById('homeVoOnceSVG'), badge=document.getElementById('homeVoBadge');
          if(!btn) return;
          if(_hmVoMode){
            if(mic)  mic.style.display='none';
            if(send) send.style.display='none';
            if(voOnce) voOnce.style.display='';
            if(badge) badge.style.display='block';
          } else {
            if(voOnce) voOnce.style.display='none';
            if(badge)  badge.style.display='none';
            var hasContent=updateHomeMicSendState();
            if(mic)  mic.style.display=hasContent?'none':'';
            if(send) send.style.display=hasContent?'':'none';
          }
        }
        function _hmSendVO(){
          var inp=document.getElementById('chatInput'); var text=(inp&&inp.value.trim())||'';
          if(!text&&!currentChatFile&&!window._homePendingText) return;
          if(!currentUser) return;
          if(inp) inp.value=''; _hmVoMode=false; _hmUpdateBtn();
          if(typeof WaEmojiPanel!=='undefined') WaEmojiPanel.close();
          var msgData={message:text||'📎 File',senderUid:currentUser.uid,
            senderName:(currentUserData&&currentUserData.name)||'Student',
            senderAvatar:(currentUserData&&currentUserData.photoURL)||null,
            ts:Date.now(),viewOnce:true};
          db.ref('public_chat').push(msgData);
          onHomeChatType();
        }

        function cancelHomeVoice(){}

            var input=document.getElementById('chatInput');

            const lecturer = document.getElementById('lectureLecturer').value;
            const hall = document.getElementById('lectureHall').value;
            const time = document.getElementById('lectureTime').value;

                        <div class="relative inline-block">
                            <div class="w-24 h-24 rounded-full bg-gradient-to-br from-pink-500 to-purple-600 flex items-center justify-center text-white font-bold text-4xl mb-4 mx-auto">

        function changeProfilePhoto() {
            // Close any open profile modal first
            document.querySelectorAll('.fixed.inset-0.z-50').forEach(function(m){ m.remove(); });
            var d = document.createElement('div');
            d.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box';

                '<p style="color:#fff;font-weight:700;font-size:17px;margin:0 0 6px">Change Profile Photo</p>' +
                '<p style="color:#9ca3af;font-size:13px;margin:0 0 20px">Choose a source</p>' +

                  '<button id="_cpCamera" style="background:linear-gradient(135deg,#9333ea,#ec4899);color:#fff;border:none;border-radius:14px;padding:13px;font-size:15px;font-weight:700;cursor:pointer">📷 Camera</button>' +
                  '<button id="_cpGallery" style="background:#374151;color:#fff;border:none;border-radius:14px;padding:13px;font-size:15px;font-weight:600;cursor:pointer">🖼️ Gallery</button>' +

        async function takePhoto() {
            var camModal = document.querySelector('.fixed.inset-0.z-50'); if(camModal) camModal.remove();
            const photo = await openCamera();
            if (photo) {
                await uploadProfilePhoto(photo);
            }
        }
        async function selectPhoto() {
            var selModal = document.querySelector('.fixed.inset-0.z-50'); if(selModal) selModal.remove();
            const file = await handleFileSelect('image/*');
            if (file) {
                await uploadProfilePhoto(file.file);

        async function uploadProfilePhoto(file) {
            showLoading("Uploading photo...");
            const compressed = await compressImage(file);
            const upload = await uploadFile(compressed, 'profiles');
            if (upload.success) {
                await updateUserProfile({ photoURL: upload.url });
                hideLoading();
                showToast('Profile photo updated!');
                showProfile();
            } else {
                hideLoading();
                showToast('Failed to upload photo', 'error');
            }
        }

            // Close existing modal first
            document.querySelectorAll('.fixed.inset-0.z-50').forEach(function(m){ m.remove(); });
            var profile = await getUserProfile();
            var modal = document.createElement('div');
            modal.className = 'fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4';
            modal.addEventListener('click', function(e){ if(e.target===modal) modal.remove(); });
            modal.innerHTML = `
                <div class="bg-gray-800 rounded-2xl max-w-md w-full p-6 border border-gray-700">
                    <h3 class="text-xl font-bold mb-5">✏️ Edit Profile</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs text-gray-400 font-semibold uppercase mb-1 block">Display Name</label>
                            <input id="epName" value="${(profile&&profile.name)||''}" placeholder="Your name"
                              class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-xl text-white focus:outline-none focus:border-pink-500">
                        </div>
                        <div>
                            <label class="text-xs text-gray-400 font-semibold uppercase mb-1 block">Bio</label>

        async function saveProfile() {
            var name = (document.getElementById('epName')||{}).value || '';
            var bio  = (document.getElementById('epBio')||{}).value  || '';
            if (!name.trim()) { showToast('Name cannot be empty', 'error'); return; }
            showLoading('Saving…');
            await updateUserProfile({ name: name.trim(), bio: bio.trim() });
            hideLoading();
            document.querySelectorAll('.fixed.inset-0.z-50').forEach(function(m){ m.remove(); });
            document.getElementById('profileInitial').textContent = name.trim()[0].toUpperCase();
            showToast('✅ Profile updated!');
        }
        async function logout() {
            await auth.signOut();
            window.location.href = 'index.html';
        }
        // Initialize
        loadPage('home');
        // ── Mini Music Player ─────────────────────────────────────────
        var _miniPlayerPaused = false;
        function miniShowBar(title, subtitle) {
          var bar = document.getElementById('miniPlayer');
          if (!bar) return;
          document.getElementById('miniTitle').textContent = title || 'Now Playing';
          document.getElementById('miniSubtitle').textContent = subtitle || 'Tap ↗ to open';
          bar.classList.add('visible');
          // Push content down
          var main = document.getElementById('mainContent');
          if (main) main.style.paddingTop = '108px';
          var topNav = document.querySelector('nav.fixed.top-0');
          if (topNav) topNav.style.top = '52px';
          sessionStorage.setItem('miniMusic', JSON.stringify({ title: title, subtitle: subtitle, paused: false }));
        }
        function miniHideBar() {
          var bar = document.getElementById('miniPlayer');
          if (!bar) return;
          bar.classList.remove('visible');
          var main = document.getElementById('mainContent');
          if (main) main.style.paddingTop = '';
          var topNav = document.querySelector('nav.fixed.top-0');
          if (topNav) topNav.style.top = '0';
          sessionStorage.removeItem('miniMusic');
        }
        function miniTogglePause() {
          _miniPlayerPaused = !_miniPlayerPaused;
          var bar = document.getElementById('miniPlayer');
          var btn = document.getElementById('miniPauseBtn');
          if (_miniPlayerPaused) {
            bar.classList.add('paused');
            if (btn) btn.innerHTML = '&#9654;'; // ▶
            // Pause the bg iframe via postMessage (works with Audiomack/SoundCloud embeds)
            var fr = document.getElementById('bgMusicFrame');
            if (fr && fr.contentWindow) {
              try { fr.contentWindow.postMessage('{"method":"pause"}', '*'); } catch(e){}
              // Also hide the container slightly (some browsers pause audio when element not rendered)
            }
          } else {
            bar.classList.remove('paused');
            if (btn) btn.innerHTML = '&#9646;&#9646;'; // ⏸
            var fr = document.getElementById('bgMusicFrame');
            if (fr && fr.contentWindow) {
              try { fr.contentWindow.postMessage('{"method":"play"}', '*'); } catch(e){}
            }
          }
          // Update session
          var stored = sessionStorage.getItem('miniMusic');
          if (stored) {
            try { var d = JSON.parse(stored); d.paused = _miniPlayerPaused; sessionStorage.setItem('miniMusic', JSON.stringify(d)); } catch(e){}
          }
        }
        function miniStop() {
          miniHideBar();
          _miniPlayerPaused = false;
          // Also stop background music iframe
          var bgFrame = document.getElementById('bgMusicFrame');
          if (bgFrame) { bgFrame.src = 'about:blank'; bgFrame.srcdoc = ''; }
          if (typeof _bgMusicKey !== 'undefined') { _bgMusicKey = null; _bgMusicLoaded = false; }
        }
        function miniGoToMusic() {
          var key = typeof _bgMusicKey !== 'undefined' ? _bgMusicKey : null;
          loadPage('music');
          if (key) {
            setTimeout(function() { openMusicInApp(key); }, 50);
          }
        }
        // Restore mini player if it was active (e.g. after reload)
        (function restoreMiniPlayer() {
          var stored = sessionStorage.getItem('miniMusic');
          if (!stored) return;
          try {
            var d = JSON.parse(stored);
            miniShowBar(d.title, d.subtitle);
            if (d.paused) {
              _miniPlayerPaused = true;
              var bar = document.getElementById('miniPlayer');
              if (bar) bar.classList.add('paused');
              var btn = document.getElementById('miniPauseBtn');
              if (btn) btn.textContent = '▶';
            }
          } catch(e) {}
        })();
        // ── Keep bottom nav fixed when keyboard opens ──────────────────
        function fixNavForKeyboard() {
          var nav = document.getElementById('bottomNav');
          var bar = document.getElementById('chatInputBar');
          if (!nav) return;
          if (window.visualViewport) {
            var vv = window.visualViewport;
            var keyboardHeight = window.innerHeight - vv.height;
            nav.style.bottom = Math.max(0, keyboardHeight) + 'px';
            if (bar) bar.style.bottom = Math.max(0, keyboardHeight + 56) + 'px';
            // Also update reply bar if visible
            var replyBar = document.getElementById('pubReplyBar');
            if (replyBar && replyBar.style.display !== 'none') {
              replyBar.style.bottom = Math.max(0, keyboardHeight + 104) + 'px';
            }
            // Scroll messages to bottom when keyboard opens
            var msgs = document.getElementById('chatMessages');
            if (msgs) setTimeout(function(){ msgs.scrollTop = msgs.scrollHeight; }, 100);
          }
        }
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', fixNavForKeyboard);
          window.visualViewport.addEventListener('scroll', fixNavForKeyboard);
        }
        window.addEventListener('resize', fixNavForKeyboard);

        // ── WaEmojiPanel init for Classroom Chat ─────────────────────────
        function _initHomeEmojiPanel(){
          if(typeof WaEmojiPanel==='undefined') return;
          WaEmojiPanel.init({
            getInputEl: function(){ return document.getElementById('chatInput'); },
            sendMessage: function(){ sendChatMessage(); },
            addEmoji: function(ch){
              var inp=document.getElementById('chatInput'); if(!inp) return;
              if(ch==='\b'){ inp.value=inp.value.slice(0,-1); }
              else { inp.value+=ch; }
              onHomeChatType(); _homeResizeTA(inp); inp.focus();
            },
            sendSticker: function(src,label,emoji){
              if(!currentUser) return;
              if(!src) return;
              var _reply = (typeof _pubReply !== 'undefined' && _pubReply) ? JSON.parse(JSON.stringify(_pubReply)) : null;
              if(_reply && typeof clearPubReply==='function') clearPubReply();
              function _push(url){
                var obj={fileUrl:url,fileType:'image/sticker',senderId:currentUser.uid,
                  senderName:(currentUserData&&currentUserData.name)||'Student',
                  senderAvatar:(currentUserData&&currentUserData.photoURL)||null,ts:Date.now()};
                if(_reply) obj.replyTo=_reply;
                db.ref('public_chat').push(obj);
              }
              fetch(src,{mode:'cors'}).then(function(r){return r.blob();}).then(function(blob){
                var ext=(blob.type||'image/png').split('/')[1]||'png';
                showSendPill('Sending…');
                uploadFile(new File([blob],'sticker_'+Date.now()+'.'+ext,{type:blob.type||'image/png'}),'stickers').then(function(res){
                  hideSendPill(); _push(res.success?res.url:src);
                }).catch(function(){hideSendPill();_push(src);});
              }).catch(function(){_push(src);});
            },
            sendGif: function(url,title){
              if(!currentUser) return;
              var _reply = (typeof _pubReply !== 'undefined' && _pubReply) ? JSON.parse(JSON.stringify(_pubReply)) : null;
              if(_reply && typeof clearPubReply==='function') clearPubReply();
              function _push(u){
                var obj={fileUrl:u,fileType:'image/gif',senderId:currentUser.uid,
                  senderName:(currentUserData&&currentUserData.name)||'Student',
                  senderAvatar:(currentUserData&&currentUserData.photoURL)||null,ts:Date.now()};
                if(_reply) obj.replyTo=_reply;
                db.ref('public_chat').push(obj);
              }
              fetch(url,{mode:'cors'}).then(function(r){return r.blob();}).then(function(blob){
                showSendPill('Sending…');
                uploadFile(new File([blob],'gif_'+Date.now()+'.gif',{type:'image/gif'}),'gifs').then(function(res){
                  hideSendPill(); _push(res.success?res.url:url);
                }).catch(function(){hideSendPill();_push(url);});
              }).catch(function(){_push(url);});
            },
            sendVoice: function(blob,mime,viewOnce){
              if(!currentUser) return;
              var file=new File([blob],'voice_'+Date.now()+'.webm',{type:mime});
              showSendPill('Sending voice…');
              uploadFile(file,'chat').then(function(res){
                hideSendPill();
                if(!res.success){showToast('Upload failed','error');return;}
                var obj={text:'🎤 Voice Note',fileUrl:res.url,fileType:mime,
                  senderUid:currentUser.uid,senderName:(currentUserData&&currentUserData.name)||'Student',
                  senderAvatar:(currentUserData&&currentUserData.photoURL)||null,ts:Date.now()};
                if(viewOnce) obj.viewOnce=true;
                db.ref('public_chat').push(obj);
              });
            }
          });
        }
        // Call after a short delay to ensure DOM is ready
        setTimeout(_initHomeEmojiPanel, 800);

        // ── WhatsApp-style Typing + Recording bubble listener ─────────────
        // CSS for bouncing dots and recording bars
        (function(){
          var s=document.createElement('style');
          s.textContent=[
            '@keyframes waDotBounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-5px);opacity:1;background:#a855f7}}',
            '.waDot{animation:waDotBounce 1.3s ease-in-out infinite}',
            '@keyframes waBarPulse{0%,100%{height:4px;opacity:.4}50%{height:18px;opacity:1}}',
            '.waBar{width:3px;border-radius:2px;background:#a855f7;display:inline-block;animation:waBarPulse 1s ease-in-out infinite}'
          ].join('');
          document.head.appendChild(s);
        })();

        function _startPubTypingListener(){
          if(!currentUser) return;
          db.ref('typing/public_chat').on('value', function(snap){
            var bar  = document.getElementById('pubTypingBar');
            var dots = document.getElementById('pubTypingDots');
            var recB = document.getElementById('pubRecBars');
            var txt  = document.getElementById('pubTypingText');
            var avs  = document.getElementById('pubTypingAvatars');
            if(!bar) return;
            var typers=[], isRec=false;
            snap.forEach(function(c){
              var d=c.val();
              if(!d||c.key===currentUser.uid) return;
              if((Date.now()-(d.ts||0))>6000) return;
              typers.push(d);
              if(d.recording) isRec=true;
            });
            if(!typers.length){ bar.style.display='none'; return; }
            bar.style.display='block';
            // Render avatars
            if(avs){
              avs.innerHTML=typers.slice(0,3).map(function(t){
                if(t.photo) return '<img src="'+t.photo+'" style="width:22px;height:22px;border-radius:50%;object-fit:cover;border:2px solid #111b21;margin-right:-4px;flex-shrink:0">';
                return '<div style="width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#ec4899,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white;flex-shrink:0;border:2px solid #111b21;margin-right:-4px">'+(t.initial||'?')+'</div>';
              }).join('');
            }
            // Dots vs bars
            if(isRec){
              if(dots) dots.style.display='none';
              if(recB) recB.style.display='flex';
              if(txt) txt.textContent = typers.length>1
                ? typers.slice(0,2).map(function(t){return t.name||'Someone';}).join(', ')+' recording…'
                : (typers[0].name||'Someone')+' recording…';
            } else {
              if(dots) dots.style.display='flex';
              if(recB) recB.style.display='none';
              if(txt) txt.textContent = typers.length>1
                ? typers.slice(0,2).map(function(t){return t.name||'Someone';}).join(', ')+' typing…'
                : '';
            }
          });
        }
        // Start after auth
        setTimeout(function(){ if(currentUser) _startPubTypingListener(); }, 2000);
    </script>
