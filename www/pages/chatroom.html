// ── ATTACH MENU (inlined for reliability) ────────────────────
/**
 * PHYSIO SUAI – Attach Menu r16 FINAL
 *
 * DEFINITIVE FIXES:
 * 1. CAMERA: Uses WebRTC getUserMedia() — shows live camera preview,
 *    user taps shutter button to capture. Works in ALL WebViews.
 *    Falls back to native input if getUserMedia unavailable.
 * 2. GALLERY: Uses <label for> pointing to persistent hidden <input>.
 *    The label is a real DOM element — user's touch IS the gesture.
 * 3. PAPERCLIP: Button gets BOTH onclick AND touchend so it fires
 *    reliably in all contexts.
 * 4. COLORS: All icons use the app's pink/purple gradient.
 * 5. CONTACT: Uses Web Contacts API (navigator.contacts) → native picker.
 *    Falls back to manual name+phone input UI.
 */

var _attachCB  = null;
var _aInjected = false;

window.onNativeFile = function(b64, mime, name) {
  if (!_attachCB) return;
  try {
    var bytes = atob(b64), arr = new Uint8Array(bytes.length);
    for (var i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    var ext = (mime.split('/')[1]||'bin').replace('jpeg','jpg').replace('mpeg','mp3');
    _attachCB(new File([arr], name||('file_'+Date.now()+'.'+ext), { type: mime }));
  } catch(e) { console.error('onNativeFile', e); }
  _attachCB = null;
};
window.onNativeFileError = function() { _attachCB = null; };

// Inject persistent hidden inputs (gallery, doc, audio — NOT camera, camera uses WebRTC)
function _injectFileInputs() {
  if (_aInjected) return;
  _aInjected = true;
  var css = document.createElement('style');
  css.textContent = '._ahi{position:fixed;top:-9999px;left:-9999px;opacity:0;width:1px;height:1px;pointer-events:none}';
  document.head.appendChild(css);

  function mkInp(id, accept) {
    var inp = document.createElement('input');
    inp.type = 'file'; inp.id = id; inp.className = '_ahi'; inp.accept = accept;
    inp.addEventListener('change', function() {
      if (inp.files && inp.files[0] && _attachCB) {
        var cb = _attachCB; _attachCB = null; cb(inp.files[0]);
      }
      inp.value = '';
    });
    document.body.appendChild(inp);
  }
  mkInp('_aInpGallery', 'image/*,video/*');
  mkInp('_aInpDoc',     '.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv');
  mkInp('_aInpAudio',   'audio/*');
}

function _injectStyles() {
  if (document.getElementById('_aCSSr16')) return;
  var s = document.createElement('style'); s.id = '_aCSSr16';
  s.textContent = [
    '@keyframes _aUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}',
    '._ao{position:fixed;inset:0;z-index:9800;background:rgba(0,0,0,.55);display:flex;align-items:flex-end}',
    '._ap{width:100%;max-width:520px;margin:0 auto;background:#1f2c34;border-radius:20px 20px 0 0;padding:20px 16px 36px;animation:_aUp .25s cubic-bezier(.34,1.1,.64,1)}',
    '._ah{width:36px;height:4px;background:#4b5563;border-radius:2px;margin:0 auto 22px}',
    '._ag{display:grid;grid-template-columns:repeat(4,1fr);gap:20px 8px}',
    '._ai{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;background:none;border:none;padding:4px;font-family:inherit}',
    '._ai:active ._aic{transform:scale(.88)}',
    '._aic{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;transition:transform .1s;background:linear-gradient(135deg,#9333ea,#ec4899)}',
    '._aic svg{width:28px;height:28px;pointer-events:none}',
    '._ail{font-size:12.5px;color:#e5e7eb;font-weight:500;pointer-events:none}'
  ].join('');
  document.head.appendChild(s);
}

  location: '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>',

};

function showAttachMenu(callback, opts) {
  // Debounce: ignore calls within 600ms of the last one
  var now = Date.now();
  if (now - (showAttachMenu._last||0) < 600) return;
  showAttachMenu._last = now;

  _attachCB = callback;
  _injectStyles();
  _injectFileInputs();

  var existing = document.getElementById('_aOvr');
  if (existing) { existing.remove(); _attachCB = null; return; }

  var ITEMS = [
    { id:'gallery',  label:'Gallery',  inputId:null },
    { id:'camera',   label:'Camera',   inputId:null },
    { id:'location', label:'Location', inputId:null },
    { id:'contact',  label:'Contact',  inputId:null },
    { id:'document', label:'Document', inputId:null },
    { id:'audio',    label:'Audio',    inputId:null },
    { id:'poll',     label:'Poll',     inputId:null },
    { id:'event',    label:'Event',    inputId:null }
  ];

  var overlay = document.createElement('div');
  overlay.id = '_aOvr'; overlay.className = '_ao';
  var _ready = false;
  setTimeout(function(){ _ready = true; }, 400);
  overlay.addEventListener('click', function(e){
    if (_ready && e.target === overlay){ overlay.remove(); _attachCB = null; }
  });

  var panel = document.createElement('div'); panel.className = '_ap';
  panel.innerHTML = '<div class="_ah"></div><div class="_ag" id="_aGrid"></div>';
  var grid = panel.querySelector('#_aGrid');

  ITEMS.forEach(function(item) {
    var inner = '<div class="_aic">'+(SVGS[item.id]||'')+'</div><span class="_ail">'+item.label+'</span>';

    if (item.inputId) {
      // GALLERY/DOC/AUDIO: <label for="input"> — user's real touch routes to input
      var lbl = document.createElement('label');
      lbl.className = '_ai'; lbl.htmlFor = item.inputId;
      lbl.innerHTML = inner;
      lbl.addEventListener('click', function(e) {
        e.stopPropagation();
        _attachCB = callback;
        // CRITICAL: Delay overlay removal — removing label from DOM during click
        // cancels the file picker gesture in Android WebView
        setTimeout(function() { overlay.remove(); }, 500);
      });
      grid.appendChild(lbl);
    } else {
      // NON-FILE (camera, location, contact, poll, event)
      var btn = document.createElement('button');
      btn.className = '_ai'; btn.type = 'button';
      btn.innerHTML = inner;
      var _actionId = item.id;
      btn.onclick = function(e) {
        e.stopPropagation();
        overlay.remove();
        _execAction(_actionId);
      };
      grid.appendChild(btn);
    }
  });

  overlay.appendChild(panel);
  document.body.appendChild(overlay);
}

function _execAction(action) {
  if (window.Android) {
    if (action==='gallery')  { window.Android.openGallery();  return; }
    if (action==='camera')   { window.Android.openCamera();   return; }
    if (action==='document') { window.Android.openDocument(); return; }
    if (action==='audio')    { window.Android.openAudio();    return; }
    if (action==='location') { window.Android.openLocation(); return; }
    if (action==='contact')  { window.Android.openContact();  return; }
  }
  if (action==='camera')   { _openCameraWebRTC(); return; }
  if (action==='location') { _openLocationUI();   return; }
  if (action==='contact')  { _openContactPicker(); return; }
  if (action==='gallery')  { _openGalleryPicker(); return; }
  if (action==='document') { _openDocumentPicker(); return; }
  if (action==='audio')    { _openAudioPicker();  return; }
  if (action==='poll')     { _openPoll();         return; }
  if (action==='event')    { _openEvent();        return; }
}

// ── CAMERA: WebRTC getUserMedia (works in ALL WebViews) ───────────────────────
function _openCameraWebRTC() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    var inp = document.createElement('input');
    inp.type='file'; inp.accept='image/*'; inp.setAttribute('capture','environment');
    inp.style.cssText='position:fixed;top:-9999px;opacity:0';
    document.body.appendChild(inp);
    inp.onchange=function(){ if(inp.files[0]&&_attachCB){var cb=_attachCB;_attachCB=null;cb(inp.files[0]);} inp.remove(); };
    inp.click(); return;
  }
  var ov = document.createElement('div');
  ov.id = '_camOv';
  ov.style.cssText = 'position:fixed;inset:0;z-index:9900;background:#000;display:flex;flex-direction:column';

  if (!document.getElementById('_camCSS')) {
    var cs = document.createElement('style'); cs.id='_camCSS';
    cs.textContent = '@keyframes _recBlink{0%,100%{opacity:1}50%{opacity:.3}}';
    document.head.appendChild(cs);
  }

  ov.innerHTML =
    '<div style="display:flex;align-items:center;padding:14px 16px;background:rgba(0,0,0,.6);flex-shrink:0;position:relative">' +
      '<button id="_camClose" style="width:40px;height:40px;background:rgba(255,255,255,.18);border-radius:50%;border:none;cursor:pointer;color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;z-index:1">✕</button>' +

        '<div style="width:min(80vw,80vh);height:min(80vw,80vh);border-radius:50%;border:3px solid rgba(255,255,255,.6);box-shadow:0 0 0 9999px rgba(0,0,0,.55)"></div>' +

    '</div>' +
    '<div id="_camStrip" style="height:72px;background:rgba(0,0,0,.7);display:flex;align-items:center;gap:6px;padding:0 12px;overflow-x:auto;flex-shrink:0;scrollbar-width:none">' +
      '<div style="width:56px;height:56px;border-radius:10px;background:#1a1f2e;display:flex;align-items:center;justify-content:center;flex-shrink:0">' +
        '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>' +
      '</div>' +
    '</div>' +
    '<div style="padding:16px 20px 28px;background:rgba(0,0,0,.7);display:flex;justify-content:space-between;align-items:center;flex-shrink:0">' +
      '<button id="_camGalleryBtn" style="width:52px;height:52px;border-radius:12px;background:#1a1f2e;border:1.5px solid #374151;cursor:pointer;display:flex;align-items:center;justify-content:center">' +
        '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#e5e7eb" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>' +
      '</button>' +
      '<button id="_camSnap" style="width:76px;height:76px;border-radius:50%;background:#fff;border:5px solid rgba(255,255,255,.3);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center">' +
        '<div id="_camSnapInner" style="width:58px;height:58px;border-radius:50%;background:#fff;transition:all .15s"></div>' +
      '</button>' +
      '<button id="_camFlip" style="width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.18);border:none;cursor:pointer;color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center">' +
        '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 013.51 15"/></svg>' +
      '</button>' +
    '</div>' +
    '<div style="background:rgba(0,0,0,.85);padding:10px 0 20px;display:flex;justify-content:center;gap:32px;flex-shrink:0">' +
      '<button id="_camModeVideo" onclick="_camSetMode(\'video\')" style="background:none;border:none;color:#8696a0;font-size:14px;font-weight:600;cursor:pointer;padding:4px 8px;border-radius:8px">Video</button>' +
      '<button id="_camModePhoto" onclick="_camSetMode(\'photo\')" style="background:rgba(255,255,255,.12);border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;padding:4px 14px;border-radius:20px">Photo</button>' +
      '<button id="_camModeNote" onclick="_camSetMode(\'note\')" style="background:none;border:none;color:#8696a0;font-size:14px;font-weight:600;cursor:pointer;padding:4px 8px;border-radius:8px">Video note</button>' +
    '</div>' +
    '<canvas id="_camCanvas" style="display:none"></canvas>';

  document.body.appendChild(ov);

  var stream = null, mediaRecorder = null, recChunks = [], timerInt = null, recSecs = 0;
  var facingMode = 'environment', camMode = 'photo', _isRecording = false;
  var vid = ov.querySelector('#_camVid');
  var canvas = ov.querySelector('#_camCanvas');

  window._camSetMode = function(mode) {
    camMode = mode;
    ['video','photo','note'].forEach(function(m) {
      var btn = ov.querySelector('#_camMode' + m.charAt(0).toUpperCase() + m.slice(1) === '_camModeNote' ? '_camModeNote' : (m==='video'?'#_camModeVideo':m==='photo'?'#_camModePhoto':'#_camModeNote'));
    });
    ov.querySelector('#_camModeVideo').style.cssText = 'background:' + (mode==='video'?'rgba(255,255,255,.12)':'none') + ';border:none;color:' + (mode==='video'?'#fff':'#8696a0') + ';font-size:14px;font-weight:' + (mode==='video'?'700':'600') + ';cursor:pointer;padding:4px ' + (mode==='video'?'14px':'8px') + ';border-radius:20px';
    ov.querySelector('#_camModePhoto').style.cssText = 'background:' + (mode==='photo'?'rgba(255,255,255,.12)':'none') + ';border:none;color:' + (mode==='photo'?'#fff':'#8696a0') + ';font-size:14px;font-weight:' + (mode==='photo'?'700':'600') + ';cursor:pointer;padding:4px ' + (mode==='photo'?'14px':'8px') + ';border-radius:20px';
    ov.querySelector('#_camModeNote').style.cssText = 'background:' + (mode==='note'?'rgba(255,255,255,.12)':'none') + ';border:none;color:' + (mode==='note'?'#fff':'#8696a0') + ';font-size:14px;font-weight:' + (mode==='note'?'700':'600') + ';cursor:pointer;padding:4px ' + (mode==='note'?'14px':'8px') + ';border-radius:20px';
    var inner = ov.querySelector('#_camSnapInner');
    var circOv = ov.querySelector('#_camCircleOv');
    var strip = ov.querySelector('#_camStrip');
    if (mode === 'photo') {
      inner.style.cssText = 'width:58px;height:58px;border-radius:50%;background:#fff;transition:all .15s';
      if (circOv) circOv.style.display = 'none';
      if (strip) strip.style.display = 'flex';
    } else if (mode === 'video') {
      inner.style.cssText = 'width:26px;height:26px;border-radius:4px;background:linear-gradient(135deg,#9333ea,#ec4899);transition:all .15s';
      if (circOv) circOv.style.display = 'none';
      if (strip) strip.style.display = 'none';
    } else {
      inner.style.cssText = 'width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,#9333ea,#ec4899);transition:all .15s';
      if (circOv) { circOv.style.display = 'flex'; }
      if (strip) strip.style.display = 'none';
    }
  };

  function _stopRec() {
    if (timerInt) { clearInterval(timerInt); timerInt = null; }
    ov.querySelector('#_camTimer').style.display = 'none';
    ov.querySelector('#_camRecDot').style.display = 'none';
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  }

  function startCam(mode) {
    if (stream) stream.getTracks().forEach(function(t){ t.stop(); });
    navigator.mediaDevices.getUserMedia({ video: { facingMode: mode }, audio: true })
      .then(function(s) { stream = s; vid.srcObject = s; })
      .catch(function() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: mode }, audio: false })
          .then(function(s) { stream = s; vid.srcObject = s; })
          .catch(function() {
            ov.remove();
            var inp = document.createElement('input');
            inp.type='file'; inp.accept='image/*'; inp.setAttribute('capture','environment');
            inp.style.cssText='position:fixed;top:-9999px;opacity:0';
            document.body.appendChild(inp);
            inp.onchange=function(){ if(inp.files[0]&&_attachCB){var cb=_attachCB;_attachCB=null;cb(inp.files[0]);} inp.remove(); };
            setTimeout(function(){ inp.click(); }, 100);
          });
      });
  }

  ov.querySelector('#_camClose').onclick = function() {
    _stopRec();
    if (stream) stream.getTracks().forEach(function(t){ t.stop(); });
    ov.remove(); delete window._camSetMode;
  };
  ov.querySelector('#_camFlip').onclick = function() {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    startCam(facingMode);
  };
  ov.querySelector('#_camGalleryBtn').onclick = function() {
    var gi = document.getElementById('_aInpGallery'); if (gi) gi.click();
  };

  ov.querySelector('#_camSnap').onclick = function() {
    if (camMode === 'photo') {
      canvas.width = vid.videoWidth || 640;
      canvas.height = vid.videoHeight || 480;
      canvas.getContext('2d').drawImage(vid, 0, 0);
      if (stream) stream.getTracks().forEach(function(t){ t.stop(); });
      canvas.toBlob(function(blob) {
        ov.remove(); delete window._camSetMode;
        if (blob && _attachCB) {
          var cb = _attachCB; _attachCB = null;
          cb(new File([blob], 'photo_'+Date.now()+'.jpg', { type: 'image/jpeg' }));
        }
      }, 'image/jpeg', 0.92);
    } else {
      if (!_isRecording) {
        _isRecording = true; recChunks = []; recSecs = 0;
        var timerEl = ov.querySelector('#_camTimer');
        timerEl.style.display = 'block'; timerEl.textContent = '00:00';
        ov.querySelector('#_camRecDot').style.display = 'block';
        timerInt = setInterval(function() {
          recSecs++;
          var m = Math.floor(recSecs/60), s = recSecs%60;
          timerEl.textContent = (m<10?'0':'')+m+':'+(s<10?'0':'')+s;
        }, 1000);
        ov.querySelector('#_camSnapInner').style.cssText = 'width:22px;height:22px;border-radius:4px;background:#ec4899;transition:all .15s';
        try {
          mediaRecorder = new MediaRecorder(stream);
          mediaRecorder.ondataavailable = function(e){ if(e.data&&e.data.size>0) recChunks.push(e.data); };
          mediaRecorder.onstop = function() {
            var blob = new Blob(recChunks, { type: 'video/webm' });
            ov.remove(); delete window._camSetMode;
            if (_attachCB) { var cb = _attachCB; _attachCB = null; cb(new File([blob], (camMode==='note'?'vidnote_':'video_')+Date.now()+'.webm', { type: 'video/webm' })); }
          };
          mediaRecorder.start();
        } catch(e) { _stopRec(); _isRecording = false; }
      } else {
        _isRecording = false; _stopRec();
      }
    }
  };

  startCam(facingMode);
  window._camSetMode('photo');
}

      '</button>' +
    '</div>' +

      '</div>' +

      '<div id="_aLocShareCurrent" style="padding:16px 18px;border-bottom:1px solid #2a3942;display:flex;align-items:center;gap:14px;cursor:pointer;-webkit-tap-highlight-color:transparent">' +
        '<div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#9333ea,#ec4899);display:flex;align-items:center;justify-content:center;flex-shrink:0">' +
          '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>' +
        '</div>' +

        '<p id="_aLocAccuracy" style="color:#8696a0;font-size:12px;margin:2px 0 0">Getting location...</p></div>' +
      '</div>' +
      '<div style="padding:12px 18px">' +
        '<p style="color:#8696a0;font-size:12px;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin:0 0 8px">Nearby places</p>' +
        '<div id="_aLocNearby" style="color:#6b7280;font-size:13px">Loading nearby places...</div>' +
      '</div>' +
    '</div>';
  document.body.appendChild(d);

  var _lat = null, _lng = null;

  function _gotLocation(p) {
    _lat = p.coords.latitude.toFixed(5);
    _lng = p.coords.longitude.toFixed(5);
    var acc = p.coords.accuracy ? 'Accurate to ' + Math.round(p.coords.accuracy) + ' meters' : 'Location found';
    var accEl = document.getElementById('_aLocAccuracy');
    if (accEl) accEl.textContent = acc;
    var mapEl = document.getElementById('_aLocMapEl');
    if (mapEl) {
      mapEl.innerHTML = '<iframe src="https://www.openstreetmap.org/export/embed.html?bbox='+(_lng-0.004)+','+(_lat-0.003)+','+(_lng*1+0.004)+','+(_lat*1+0.003)+'&layer=mapnik&marker='+_lat+','+_lng+'" style="width:100%;height:100%;border:none;pointer-events:none" scrolling="no"></iframe>';
    }
    var nbEl = document.getElementById('_aLocNearby');
    if (nbEl) {
      nbEl.innerHTML = '<a href="https://maps.google.com/?q='+_lat+','+_lng+'&z=16" target="_blank" style="display:block;color:#a78bfa;font-size:13px;text-decoration:none;padding:8px 0;border-bottom:1px solid #1a1f2e">🗺️ Open in Google Maps</a>' +

    if (!_lat) { return; }
    d.remove();
    _textCB('📍 Location: https://maps.google.com/?q=' + _lat + ',' + _lng);
  };
  document.getElementById('_aLocRefresh').onclick = function() {
    _lat = null; _lng = null;
    if (navigator.geolocation) navigator.geolocation.getCurrentPosition(_gotLocation, function(){}, { enableHighAccuracy: true, timeout: 12000 });
  };
  if (!navigator.geolocation) {
    var accEl = document.getElementById('_aLocAccuracy');
    if (accEl) accEl.textContent = 'GPS not available on this device';
    return;
  }
  navigator.geolocation.getCurrentPosition(_gotLocation, function() {
    var accEl = document.getElementById('_aLocAccuracy');
    if (accEl) accEl.textContent = 'Could not get location — enable GPS';
  }, { enableHighAccuracy: true, timeout: 12000 });
}

  var COLORS = ['#ec4899','#8b5cf6','#3b82f6','#10b981','#f97316','#06b6d4','#a855f7','#ef4444'];
  function _clr(name){ return COLORS[(name||'?').charCodeAt(0)%COLORS.length]; }
  function _ini(name){ return (name||'?')[0].toUpperCase(); }

  /* ── Render chips ── */
  function _renderChips() {
    var chips = document.getElementById('_ctChips');
    var cnt   = document.getElementById('_ctSelCount');
    var bar   = document.getElementById('_ctSendBar');
    var btn   = document.getElementById('_ctSendBtn');
    if (cnt) cnt.textContent = _selected.length + ' selected';
    if (bar) bar.style.display = _selected.length > 0 ? 'block' : 'none';
    if (btn) btn.textContent = 'Send ' + _selected.length + ' Contact' + (_selected.length !== 1 ? 's' : '');
    if (!chips) return;
    if (_selected.length === 0) { chips.style.display = 'none'; chips.innerHTML = ''; return; }
    chips.style.display = 'flex';
    chips.innerHTML = _selected.map(function(c, i) {
      var bg = _clr(c.name);
      return '<div style="display:flex;align-items:center;gap:6px;background:rgba(147,51,234,.22);border:1.5px solid rgba(147,51,234,.4);border-radius:24px;padding:5px 10px 5px 6px;flex-shrink:0;max-width:140px">' +
        '<div style="width:26px;height:26px;border-radius:50%;background:' + bg + ';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:#fff;flex-shrink:0">' + _ini(c.name) + '</div>' +
        '<span style="color:#e9d5ff;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70px">' + _xesc(c.name) + '</span>' +
        '<button onclick="_ctDeselectIdx(' + i + ')" style="background:none;border:none;color:#a78bfa;font-size:15px;cursor:pointer;padding:0;line-height:1;flex-shrink:0;margin-left:2px">✕</button>' +
      '</div>';
    }).join('');
  }

  /* ── Deselect by chip index ── */
  window._ctDeselectIdx = function(idx) {
    _selected.splice(idx, 1);
    _renderChips();
    _renderList(_activeList);
  };

  /* ── Render list ── */
  function _renderList(contacts) {
    _activeList = contacts;
    var list = document.getElementById('_ctList');
    if (!list) return;
    if (!contacts || !contacts.length) {
      list.innerHTML =
        '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:14px">' +
          '<div style="width:72px;height:72px;border-radius:50%;background:rgba(147,51,234,.12);display:flex;align-items:center;justify-content:center">' +
            '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="1.6"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>' +
          '</div>' +
          (_tab === 'phone'
            ? '<p style="color:#e9d5ff;font-size:15px;font-weight:700;margin:0;text-align:center">Phone Contacts</p>' +
              '<p style="color:#6b7280;font-size:13px;margin:0;text-align:center;line-height:1.5">Permission was denied or no contacts found.<br>This will use <strong style="color:#a78bfa">Expo Contacts API</strong> in the native app.</p>' +
              '<button id="_ctPhoneRetry" onclick="_ctLoadPhone()" style="margin-top:4px;background:linear-gradient(135deg,#9333ea,#ec4899);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;padding:11px 24px;cursor:pointer">Allow Access</button>'
            : '<p style="color:#e9d5ff;font-size:15px;font-weight:700;margin:0">No app users found</p>' +
              '<p style="color:#6b7280;font-size:13px;margin:0;text-align:center">No other users are registered yet.</p>'
          ) +
        '</div>';
      return;
    }
    list.innerHTML = contacts.map(function(c, i) {
      var sel = _selected.some(function(s){ return (s.uid && s.uid === c.uid) || (s.name === c.name && s.phone === c.phone); });
      var bg  = _clr(c.name);
      var sub = c.phone || c.email || (_tab === 'app' ? 'App user' : '');
      return '<div onclick="_ctToggle(' + i + ')" style="display:flex;align-items:center;gap:14px;padding:13px 18px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;background:' + (sel ? 'rgba(147,51,234,.14)' : 'transparent') + ';-webkit-tap-highlight-color:transparent;transition:background .12s" class="_ctRow">' +
        /* Avatar */
        '<div style="width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,' + bg + ',#8b5cf6);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:#fff;flex-shrink:0;box-shadow:0 4px 12px rgba(0,0,0,.3)">' + _ini(c.name) + '</div>' +
        /* Info */
        '<div style="flex:1;min-width:0">' +
          '<p style="color:#f3e8ff;font-weight:700;font-size:15px;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + _xesc(c.name || 'Unknown') + '</p>' +
          (sub ? '<p style="color:#8696a0;font-size:12.5px;margin:3px 0 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + _xesc(sub) + '</p>' : '') +
        '</div>' +
        /* Checkbox */
        '<div style="width:26px;height:26px;border-radius:50%;border:2.5px solid ' + (sel ? 'transparent' : 'rgba(255,255,255,.2)') + ';background:' + (sel ? 'linear-gradient(135deg,#9333ea,#ec4899)' : 'transparent') + ';display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;box-shadow:' + (sel ? '0 3px 10px rgba(147,51,234,.5)' : 'none') + '">' +
          (sel ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>' : '') +
        '</div>' +
      '</div>';
    }).join('');
  }

  /* ── Toggle selection ── */
  window._ctToggle = function(idx) {
    var c = _activeList[idx]; if (!c) return;
    var pos = _selected.findIndex(function(s){ return (s.uid && s.uid === c.uid) || (s.name === c.name && s.phone === c.phone); });
    if (pos >= 0) _selected.splice(pos, 1);
    else _selected.push({uid:c.uid||null, name:c.name, phone:c.phone||'', email:c.email||''});
    _renderChips();
    _renderList(_activeList);
  };

  /* ── Search ── */
  window._ctDoSearch = function(q) {
    var src = _tab === 'app' ? _appContacts : _phoneContacts;
    if (!q) { _renderList(src); return; }
    var ql = q.toLowerCase();
    _renderList(src.filter(function(c){
      return (c.name||'').toLowerCase().includes(ql) || (c.phone||'').includes(q) || (c.email||'').toLowerCase().includes(ql);
    }));
  };

  /* ── Tab switch ── */
  window._ctSwitchTab = function(tab) {
    _tab = tab;
    var si = document.getElementById('_ctSearchInp'); if (si) si.value = '';
    ['app','phone'].forEach(function(t) {
      var b = document.getElementById('_ctTab' + (t === 'app' ? 'App' : 'Phone'));
      if (!b) return;
      var on = t === tab;
      b.style.borderBottomColor = on ? '#ec4899' : 'transparent';
      b.style.color = on ? '#ec4899' : '#6b7280';
      b.style.fontWeight = on ? '700' : '600';
    });
    if (tab === 'phone') {
      if (!_phoneLoaded) _ctLoadPhone();
      else _renderList(_phoneContacts);
    } else {
      _renderList(_appContacts);
    }
  };

  /* ── Load phone contacts (Expo/RN-ready; Web Contacts API fallback) ── */
  window._ctLoadPhone = function() {
    var list = document.getElementById('_ctList');
    if (list) list.innerHTML =
      '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:16px">' +
        '<div style="width:56px;height:56px;border-radius:50%;border:3px solid #9333ea;border-top:3px solid transparent;animation:spin .8s linear infinite"></div>' +
        '<p style="color:#a78bfa;font-size:14px;font-weight:600;margin:0">Requesting permission...</p>' +
      '</div>';

    /* ── Expo Contacts bridge (React Native / Expo) ── */
    if (window.ExpoContacts) {
      window.ExpoContacts.requestPermissionsAsync().then(function(r) {
        if (r.status !== 'granted') { _phoneLoaded = true; _phoneContacts = []; _renderList([]); return; }
        return window.ExpoContacts.getContactsAsync({ fields: [window.ExpoContacts.Fields.Name, window.ExpoContacts.Fields.PhoneNumbers, window.ExpoContacts.Fields.Emails] });
      }).then(function(result) {
        if (!result) return;
        _phoneContacts = (result.data || []).map(function(c){
          return { name: c.name || 'Unknown', phone: (c.phoneNumbers && c.phoneNumbers[0] && c.phoneNumbers[0].number) || '', email: (c.emails && c.emails[0] && c.emails[0].email) || '' };
        }).sort(function(a,b){ return a.name.localeCompare(b.name); });
        _phoneLoaded = true;
        _renderList(_phoneContacts);
      }).catch(function(){ _phoneLoaded = true; _phoneContacts = []; _renderList([]); });
      return;
    }

    /* ── Web Contacts API fallback (Chrome Android 80+) ── */
    if (navigator.contacts && navigator.contacts.select) {
      navigator.contacts.select(['name','tel','email'], { multiple: true })
        .then(function(cts) {
          _phoneContacts = (cts || []).map(function(c){
            return { name: (c.name && c.name[0]) || 'Unknown', phone: (c.tel && c.tel[0]) || '', email: (c.email && c.email[0]) || '' };
          }).sort(function(a,b){ return a.name.localeCompare(b.name); });
          _phoneLoaded = true;
          _renderList(_phoneContacts);
        })
        .catch(function(){ _phoneLoaded = true; _phoneContacts = []; _renderList([]); });
      return;
    }

    /* ── No API available — show React Native notice ── */
    _phoneLoaded = true;
    _phoneContacts = [];
    _renderList([]);
  };

  /* ── Search toggle ── */
  document.getElementById('_ctSearchToggle').onclick = function() {
    _searchOpen = !_searchOpen;
    var bar = document.getElementById('_ctSearchBar');
    if (bar) { bar.style.display = _searchOpen ? 'flex' : 'none'; }
    if (_searchOpen) { setTimeout(function(){ var si = document.getElementById('_ctSearchInp'); if (si) si.focus(); }, 80); }
    else { var si = document.getElementById('_ctSearchInp'); if (si) si.value = ''; _ctDoSearch(''); }
  };

  /* ── Close ── */
  document.getElementById('_ctClose').onclick = function() { d.remove(); };

  /* ── Send ── */
  document.getElementById('_ctSendBtn').onclick = function() {
    if (!_selected.length) return;
    d.remove();
    if (_selected.length === 1) {
      var c = _selected[0];
      var msg = '👤 *Contact:* ' + c.name;
      if (c.phone) msg += '\n📞 ' + c.phone + '\n[call:' + c.phone.replace(/\s/g,'') + ']';
      if (c.email) msg += '\n📧 ' + c.email;
      _textCB(msg);
    } else {
      var msg = '👥 *Contacts (' + _selected.length + '):*\n' +
        _selected.map(function(c,i){ return (i+1) + '. ' + c.name + (c.phone ? ' · ' + c.phone : ''); }).join('\n');
      _textCB(msg);
    }
  };

  /* ── Initial load: App contacts from Firebase ── */
  (function _loadApp() {
    var list = document.getElementById('_ctList');
    if (list) list.innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;padding:60px 24px;gap:16px">' +
        '<div style="width:48px;height:48px;border-radius:50%;border:3px solid #9333ea;border-top:3px solid transparent;animation:spin .8s linear infinite"></div>' +
        '<p style="color:#a78bfa;font-size:14px;font-weight:600;margin:0">Loading app users...</p>' +
      '</div>';
    if (typeof db !== 'undefined' && typeof currentUser !== 'undefined' && currentUser) {
      db.ref('users').once('value').then(function(snap) {
        _appContacts = [];
        snap.forEach(function(c) {
          if (c.key === currentUser.uid) return;
          var v = c.val() || {};
          if (!v.name && !v.displayName) return;
          _appContacts.push({ uid: c.key, name: v.name || v.displayName || 'Unknown', phone: v.phone || '', email: v.email || '' });
        });
        _appContacts.sort(function(a,b){ return (a.name||'').localeCompare(b.name||''); });
        _renderList(_appContacts);
      }).catch(function(){ _renderList([]); });
    } else {
      _renderList([]);
    }
  })();
}

function _openPoll() {

      '<p style="color:#a78bfa;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:0 0 8px">Question</p>' +
      '<textarea id="_pollQ" placeholder="Ask question" rows="3" style="width:100%;background:#1a1f2e;border:1.5px solid #2a3942;border-radius:14px;color:#fff;font-size:15px;padding:12px 14px;outline:none;resize:none;box-sizing:border-box;font-family:inherit;margin-bottom:20px" oninput="_pollCheck()"></textarea>' +
      '<p style="color:#a78bfa;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:0 0 8px">Options</p>' +
      '<div id="_pollOpts">' +
        '<div class="_pollOptRow" style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><input class="_pollOpt" placeholder="Option 1" style="flex:1;background:#1a1f2e;border:1.5px solid #2a3942;border-radius:12px;color:#fff;font-size:14px;padding:11px 14px;outline:none;font-family:inherit" oninput="_pollCheck()"></div>' +
        '<div class="_pollOptRow" style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><input class="_pollOpt" placeholder="Option 2" style="flex:1;background:#1a1f2e;border:1.5px solid #2a3942;border-radius:12px;color:#fff;font-size:14px;padding:11px 14px;outline:none;font-family:inherit" oninput="_pollCheck()"></div>' +
      '</div>' +
      '<button onclick="_pollAddOption()" style="width:100%;background:#1a1f2e;border:1.5px dashed #2a3942;border-radius:12px;color:#a78bfa;font-size:14px;font-weight:600;padding:12px;cursor:pointer;margin-bottom:20px">+ Add option</button>' +
      '<div style="display:flex;align-items:center;justify-content:space-between;background:#1a1f2e;border-radius:14px;padding:14px 16px">' +
        '<span style="color:#fff;font-size:14px">Allow multiple answers</span>' +
        '<div id="_pollMultiTog" onclick="_pollToggleMulti(this)" style="width:48px;height:26px;background:#374151;border-radius:13px;cursor:pointer;position:relative;transition:background .2s"><div style="width:22px;height:22px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.4)"></div></div>' +
      '</div>' +
    '</div>';
  document.body.appendChild(d);
  var _multi = false;
  window._pollCheck = function() {
    var q = (document.getElementById('_pollQ').value||'').trim();
    var n = Array.from(document.querySelectorAll('._pollOpt')).filter(function(i){ return i.value.trim(); }).length;
    var b = document.getElementById('_pollSendBtn');
    if (b) { b.disabled = !(q && n >= 2); b.style.opacity = (q && n >= 2) ? '1' : '.5'; }
  };
  window._pollAddOption = function() {
    var c = document.getElementById('_pollOpts'); if (!c || c.children.length >= 12) return;
    var n = c.children.length + 1;
    var r = document.createElement('div');
    r.className = '_pollOptRow'; r.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:8px';
    r.innerHTML = '<input class="_pollOpt" placeholder="Option ' + n + '" style="flex:1;background:#1a1f2e;border:1.5px solid #2a3942;border-radius:12px;color:#fff;font-size:14px;padding:11px 14px;outline:none;font-family:inherit" oninput="_pollCheck()">' +
      '<button onclick="var r=this.closest(\'._pollOptRow\');if(document.querySelectorAll(\'._pollOpt\').length>2){r.remove();_pollCheck();}" style="background:none;border:none;color:#6b7280;font-size:22px;cursor:pointer;flex-shrink:0;line-height:1">✕</button>';
    c.appendChild(r); r.querySelector('input').focus();
  };
  window._pollToggleMulti = function(el) {
    _multi = !_multi;

    var opts = Array.from(document.querySelectorAll('._pollOpt')).map(function(i,x){ return em[x] + ' ' + i.value.trim(); }).filter(function(s){ return s.trim().length > 3; });
    if (opts.length < 2) return;
    d.remove();
    _textCB('📊 *Poll:* ' + q + '\n' + opts.join('\n') + (_multi ? '\n\n_Multiple answers allowed_' : '') + '\n\n_Tap to vote!_');
  };
}

    var title = (document.getElementById('_evtN').value||'').trim();

    if (remind) msg += '\n🔔 Reminder: ' + remind.replace('m',' min').replace('h',' hour').replace('d',' day') + ' before';
    d.remove();
    _textCB(msg);
  };
}

function _textCB(text) {
  if (_attachCB) { _attachCB(null, 'text', text); _attachCB = null; }
  else if (window._waDirectSend) { window._waDirectSend(text); }
}
function _v(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; }

function loadFriends() {
  if (!currentUser) return;
  db.ref('users').once('value').then(function(snap) {
    snap.forEach(function(c) {
      if (c.key !== currentUser.uid) _friendsList.push({uid:c.key, name:(c.val().name||'Student')});
    });
  });
}

function onType() {
  var inp=document.getElementById('msgInp');
  var v=inp.value;
  var trimmed=v.trim();

  // ── INSTANT secret commands ──────────────────────────────────────
  if (/^\.@calc(ulator)?$/i.test(trimmed)) {
    inp.value=''; _hasContent=false; updateBtn();
    if(typeof GeminiChat!=='undefined') GeminiChat.openCalc();
    return;
  }
  if (/^\.@calend(er|ar)?$/i.test(trimmed)) {
    inp.value=''; _hasContent=false; updateBtn();
    if(typeof GeminiChat!=='undefined') GeminiChat.openCalend();
    return;
  }

  _hasContent = trimmed.length>0||!!_pending||!!_pendTxt;
  _crUpdateBtn();
  if (trimmed.length>0) closeEmoji();

  // @mention dropdown
  var m=v.match(/@(\w*)$/);
  var dd=document.getElementById('mentionDD');
  if (m) {
    var q=m[1].toLowerCase();
    var hits=_friendsList.filter(function(f){return f.name.toLowerCase().includes(q);});
    if ('gemini'.includes(q)) hits.unshift({uid:'gemini', name:'Gemini'});
    if (hits.length) {
      dd.style.display='block';
      dd.innerHTML=hits.slice(0,6).map(function(f){
        return '<button onclick="insertMention(\''+esc(f.name)+'\')" style="display:flex;align-items:center;gap:8px;width:100%;background:none;border:none;cursor:pointer;padding:8px 10px;border-radius:10px;color:#fff;font-size:14px;text-align:left" onmouseover="this.style.background=\'#2a3942\'" onmouseout="this.style.background=\'none\'">'+
          '<span style="width:30px;height:30px;background:linear-gradient(135deg,#ec4899,#8b5cf6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-size:12px">'+f.name[0].toUpperCase()+'</span>'+
          '@'+f.name+'</button>';
      }).join('');
    } else { dd.style.display='none'; }
  } else { dd.style.display='none'; }
}

function insertMention(name) {
  var inp=document.getElementById('msgInp');
  inp.value=inp.value.replace(/@\w*$/,'@'+name+' ');
  document.getElementById('mentionDD').style.display='none';
  inp.focus(); onType();
}

}

// ═══ FILE ATTACH ════════════════════════════════════════════════
function onAttached(file, type, extra) {
  if (type==='text'||(!file&&extra)){
    _pendTxt=extra||type; _hasContent=true; updateBtn();
    var txt = extra||'';
    // Smart preview based on content type
    if(/^📊 \*Poll:\*/.test(txt)) {
      var pq = txt.split('\n')[0].replace(/^📊 \*Poll:\*\s*/,'');
      _setFileStrip('📊','linear-gradient(135deg,#6366f1,#8b5cf6)','Poll',pq.substring(0,50));
    } else if(/^📍 Location:/.test(txt)) {
      var loc = txt.replace(/^📍 Location:\s*/,'').split('\n')[0];
      _setFileStrip('📍','linear-gradient(135deg,#10b981,#059669)','Location',loc.substring(0,50));
    } else if(/^👤 \*Contact:\*/.test(txt)||/^👥 \*Contacts/.test(txt)) {
      var cn = txt.split('\n')[0].replace(/^👤 \*Contact:\*\s*/,'').replace(/^👥 \*Contacts[^:]*:\*\s*/,'');
      _setFileStrip('👤','linear-gradient(135deg,#f97316,#ef4444)','Contact',cn.substring(0,50));
    } else if(/^📅 \*Event:\*/.test(txt)) {
      var en = txt.split('\n')[0].replace(/^📅 \*Event:\*\s*/,'');
      _setFileStrip('📅','linear-gradient(135deg,#ec4899,#8b5cf6)','Event',en.substring(0,50));
    } else {
      _setFileStrip('📄','linear-gradient(135deg,#374151,#4b5563)','Attachment',txt.substring(0,50));
    }
    return;
  }
  if (!file) return;
  _pending=file; _hasContent=true; updateBtn();
  if (file.type.startsWith('image/') || file.type.startsWith('video/')) {
    showFilePreview(file, function(f, caption, viewOnce) {
      _pending=f; _viewOnceFlag=!!viewOnce; _hasContent=true; updateBtn();
      if(caption){ var inp=document.getElementById('msgInp'); if(inp) inp.value=caption; }
      if(f.type.startsWith('image/')){
        var u2=URL.createObjectURL(f);
        var th=document.getElementById('imgPrevThumb'); if(th){th.src=u2;}
        var ps=document.getElementById('imgPreviewStrip'); if(ps) ps.style.display='flex';
        var fs=document.getElementById('fileStrip'); if(fs) fs.style.display='none';
      } else {
        var ic2='📹'; var fsI=document.getElementById('fsIco'); if(fsI) fsI.textContent=ic2;
        var fsN=document.getElementById('fsNam'); if(fsN) fsN.textContent=f.name;
        var ips=document.getElementById('imgPreviewStrip'); if(ips) ips.style.display='none';
        var fss=document.getElementById('fileStrip'); if(fss) fss.style.display='block';
      }
    });
    return;
  }
  var ic=file.type.startsWith('audio/')?'🎵':file.type.startsWith('video/')?'📹':'📄';
  var icoGr=file.type.startsWith('audio/')?'linear-gradient(135deg,#8b5cf6,#6366f1)':file.type.startsWith('video/')?'linear-gradient(135deg,#ec4899,#9333ea)':'linear-gradient(135deg,#374151,#6b7280)';
  var lbl=file.type.startsWith('audio/')?'Voice / Audio':file.type.startsWith('video/')?'Video':'Document';
  _setFileStrip(ic, icoGr, lbl, file.name);
}

          var iw=imgEl.naturalWidth,ih=imgEl.naturalHeight;
          var c4=document.createElement('canvas');c4.width=iw;c4.height=ih;
          var ctx4=c4.getContext('2d');

          else ctx4.drawImage(imgEl,0,0,iw,ih);
          // Draw strokes — canvas is now aligned to image bounds, so scale 1:1 to natural size
          if(_drawCanvas&&_drawCtx&&_drawCanvas.width>0){
            // _drawCanvas pixel dimensions = rendered image px; scale to natural image px
            ctx4.save();

            var sp=w.querySelector('span');if(!sp){if(ctrl)ctrl.style.display='';return;}
            var wr=w.getBoundingClientRect();
            var rx=(wr.left-olr2.left)*scx, ry=(wr.top-olr2.top)*scy;
            var displayFs=parseFloat(sp.style.fontSize)||44;
            var scaledFs=displayFs*(ih/olr2.height);
            if(w.dataset.emoji==='1'){
              ctx4.font=scaledFs+'px serif';
              ctx4.textBaseline='top';
              ctx4.fillText(sp.textContent,rx+4,ry);
            } else {

              ctx4.fillStyle=sp.style.color||'#fff';
              ctx4.shadowBlur=10;ctx4.shadowColor='rgba(0,0,0,.9)';
              ctx4.textBaseline='top';
              ctx4.fillText(sp.textContent,rx+4,ry);
              ctx4.shadowBlur=0;
            }
            if(ctrl)ctrl.style.display='';
          });
          c4.toBlob(function(blob){
            if(!blob){URL.revokeObjectURL(objUrl);ov.remove();onSend(file,cap,_viewOnce);return;}
            var flat=new File([blob],file.name||'image.jpg',{type:'image/jpeg',lastModified:Date.now()});
            URL.revokeObjectURL(objUrl);ov.remove();onSend(flat,cap,_viewOnce);
          },'image/jpeg',0.93);
          return;
        }catch(err){console.warn('composite failed:',err);}
      }
    }
    URL.revokeObjectURL(objUrl);ov.remove();onSend(file,cap,_viewOnce);
  };
  capInput.addEventListener('keydown',function(e){if(e.key==='Enter')sendBtn.click();});
  setTimeout(function(){capInput.focus();},350);

function initSwipe(wrap,id,sender,text,fileUrl,fileType,viewOnce){
  var startX=0,startY=0,dx=0,el=wrap.querySelector('.bcont'),swiped=false;
  wrap.addEventListener('touchstart',function(e){startX=e.touches[0].clientX;startY=e.touches[0].clientY;dx=0;swiped=false;},{passive:true});
  wrap.addEventListener('touchmove',function(e){
    var dy=Math.abs(e.touches[0].clientY-startY);
    dx=e.touches[0].clientX-startX;
    // Only trigger if horizontal movement dominates (not a vertical scroll)
    if(dy>20){dx=0;return;}
    if(dx>0&&dx<120){el.style.transform='translateX('+dx+'px)';el.style.transition='none';}
  },{passive:true});
  wrap.addEventListener('touchend',function(){
    el.style.transition='transform .2s ease';el.style.transform='';
    // 130px threshold — requires deliberate swipe, won't trigger by scrolling
    if(dx>130&&!swiped){swiped=true;if(navigator.vibrate)navigator.vibrate(30);setReply(id,sender,text,fileUrl,fileType,viewOnce);}
  });
}

function _crPlayVoice(container, url) {
  var btn = container.querySelector('button');
  var timeEl = container.querySelector('div > div:last-child');
  var bars = container.querySelectorAll('div[style*="background:rgba"]');
  if (!container._audio) {
    var a = new Audio(url);
    container._audio = a;
    a.addEventListener('loadedmetadata', function(){
      var d = Math.floor(a.duration); var m=Math.floor(d/60),s=d%60;
      if(timeEl) timeEl.textContent = m+':'+(s<10?'0':'')+s;
    });
    a.addEventListener('timeupdate', function(){
      if(!a.duration)return;
      var p = a.currentTime/a.duration;
      var d = Math.floor(a.currentTime); var m=Math.floor(d/60),s=d%60;
      if(timeEl) timeEl.textContent = m+':'+(s<10?'0':'')+s;
      bars.forEach(function(b,i){ b.style.background = (i/bars.length < p) ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.4)'; });
    });
    a.addEventListener('ended', function(){
      container._playing = false;
      if(btn) btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
      bars.forEach(function(b){ b.style.background = 'rgba(255,255,255,0.6)'; });
      if(timeEl){ var d=Math.floor(a.duration);var m=Math.floor(d/60),s=d%60;timeEl.textContent=m+':'+(s<10?'0':'')+s; }
    });
  }
  if (container._playing) {
    container._audio.pause(); container._playing = false;
    if(btn) btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
  } else {
    document.querySelectorAll('[data-voice-playing]').forEach(function(el){ el.removeAttribute('data-voice-playing'); if(el._audio){el._audio.pause();el._playing=false;} });
    container._audio.play().catch(function(){});
    container._playing = true; container.setAttribute('data-voice-playing','1');
    if(btn) btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="white"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>';
  }
}

  } else {
    // Generic file

// ═══ MIC HOLD ════════════════════════════════════════════════════
function onMicClick(){
  if(_hasContent){ _crVoMode ? _crSendVO() : doSend(); return; }
  // no content + short tap = open voice sheet via WaEmojiPanel
  if(typeof WaEmojiPanel!=='undefined') WaEmojiPanel.openVoiceSheet();
}
function onMicDown(e){
  e.preventDefault();
  _crSbFired=false;
  _holdT=setTimeout(function(){
    _crSbFired=true;
    _micHeld=true;
    if(_hasContent){ _crToggleVO(); }
    else { startVoice(); }
  }, 600);
}
function onMicUp(e){
  clearTimeout(_holdT);
  if(_crSbFired){ _crSbFired=false; return; } // hold already handled, don't also tap-send
  if(_micHeld&&_mediaRec&&_mediaRec.state==='recording'){ stopVoice(); _micHeld=false; return; }
  _micHeld=false;
  // Short tap
  if(_hasContent){ _crVoMode?_crSendVO():doSend(); }
  else { if(typeof WaEmojiPanel!=='undefined') WaEmojiPanel.openVoiceSheet(); }
}
function onMicLeave(){clearTimeout(_holdT);_crSbFired=false;if(_micHeld&&_mediaRec&&_mediaRec.state==='recording')stopVoice();_micHeld=false;}

function _crSendVO() {
  var inp = document.getElementById('msgInp');
  var text = (inp && inp.value.trim()) || '';
  if (!text && !_pending && !_pendTxt) return;
  if (!currentUser) return;
  if (inp) inp.value = '';
  _hasContent = false;
  _crVoMode = false; _crUpdateBtn();
  if (typeof WaEmojiPanel !== 'undefined') WaEmojiPanel.close();
  var msgData = { text: _pendTxt ? ((_pendTxt + (text ? '\n' + text : '')) || '📄') : (text || '📎 File'), senderUid: currentUser.uid, senderName: currentUser.displayName || 'Student', ts: Date.now(), read: false, viewOnce: true };
  _pendTxt = null;
  if (_pending) {
    var f = _pending; clearPending();
    showSendProgress('Uploading…');
    uploadFile(f, 'chat').then(function(res) {
      hideSendProgress();
      msgData.fileUrl = res.success ? res.url : null;
      msgData.fileType = f.type;
      db.ref('chats/' + chatId).push(msgData);
    });
  } else {
    db.ref('chats/' + chatId).push(msgData);
  }
  scrollBottom();
}

// ═══ VOICE RECORDING ═════════════════════════════════════════════
function startVoice(){
  if(!navigator.mediaDevices){showToast('Mic not available','error');return;}
  navigator.mediaDevices.getUserMedia({audio:true,video:false}).then(function(stream){
    _recStream=stream;_chunks=[];_recSecs=0;
    var mime=['audio/webm;codecs=opus','audio/webm',''].find(function(m){return!m||MediaRecorder.isTypeSupported(m);});
    _mediaRec=mime?new MediaRecorder(stream,{mimeType:mime}):new MediaRecorder(stream);
    _mediaRec.ondataavailable=function(e){if(e.data.size>0)_chunks.push(e.data);};
    _mediaRec.start(100);
    document.getElementById('recBar').style.display='flex';
    document.getElementById('inputBar').style.display='none';
    document.getElementById('sendBtn').style.background='#ef4444';
    _recInt=setInterval(function(){_recSecs++;var mn=Math.floor(_recSecs/60),s=_recSecs%60;document.getElementById('recTimer').textContent=mn+':'+(s<10?'0':'')+s;},1000);
    if(navigator.vibrate)navigator.vibrate(50);
  }).catch(function(){showToast('Mic permission denied','error');_micHeld=false;});
}
function stopVoice(){
  if(!_mediaRec||_mediaRec.state!=='recording')return;
  clearInterval(_recInt);
  document.getElementById('recBar').style.display='none';
  document.getElementById('inputBar').style.display='';
  document.getElementById('sendBtn').style.background='';
  if(_recSecs<1){cancelVoice();showToast('Hold longer to record','error');return;}
  _mediaRec.onstop=function(){
    var mime=_mediaRec.mimeType||'audio/webm';
    var blob=new Blob(_chunks,{type:mime});
    var file=new File([blob],'voice_'+Date.now()+'.webm',{type:mime});
    showSendProgress('Sending voice note…');
    uploadFile(file,'chat').then(function(res){
      hideSendProgress();
      if(!res.success){showToast('Upload failed','error');return;}
      db.ref('chats/'+chatId).push({text:'🎤 Voice Note',fileUrl:res.url,fileType:mime,senderUid:currentUser.uid,senderName:currentUser.displayName||'Student',ts:Date.now(),read:false});
      scrollBottom();
    });
    if(_recStream)_recStream.getTracks().forEach(function(t){t.stop();});
  };
  _mediaRec.stop();
}
function cancelVoice(){
  if(_mediaRec&&_mediaRec.state==='recording')_mediaRec.stop();
  clearInterval(_recInt);
  if(_recStream)_recStream.getTracks().forEach(function(t){t.stop();});
  _mediaRec=null;_chunks=[];_recSecs=0;_micHeld=false;
  document.getElementById('recBar').style.display='none';
  document.getElementById('inputBar').style.display='';
  document.getElementById('recTimer').textContent='0:00';
  document.getElementById('sendBtn').style.background='';
}

// ═══ SCROLL / HELPERS ════════════════════════════════════════════
// ── Scroll-to-bottom + unread counter ────────────────────────────
var _unreadCount = 0;
var _isAtBottom = true;

function isAtBottom() {
  var m = document.getElementById('msgs');
  if (!m) return true;
  return m.scrollHeight - m.scrollTop - m.clientHeight < 80;
}

function updateScrollBtn() {
  var btn = document.getElementById('scrollDownBtn');
  var badge = document.getElementById('unreadBadge');
  if (!btn) return;
  if (_isAtBottom) {
    btn.style.display = 'none';
    _unreadCount = 0;
    if (badge) badge.style.display = 'none';
  } else {
    btn.style.display = 'flex';
    if (_unreadCount > 0 && badge) {
      badge.textContent = _unreadCount > 99 ? '99+' : _unreadCount;
      badge.style.display = 'flex';
    } else if (badge) {
      badge.style.display = 'none';
    }
  }
}

function scrollToBottom() {
  var m = document.getElementById('msgs');
  if (m) m.scrollTop = m.scrollHeight;
  _unreadCount = 0;
  _isAtBottom = true;
  updateScrollBtn();
}

function scrollBottom() {
  if (_isAtBottom) {
    var m = document.getElementById('msgs');
    if (m) m.scrollTop = m.scrollHeight;
  } else {
    _unreadCount++;
    updateScrollBtn();
  }
}

// Attach scroll listener
(function() {
  function attachScrollListener() {

// ═══ FIREBASE LISTENERS ══════════════════════════════════════════
function initChat() {
  if (!currentUser || !friendUid) { location.href='../index.html'; return; }
  chatId = [currentUser.uid, friendUid].sort().join('_');

  // Load wallpaper for this chat
  loadWallpaper();

  // Load pinned
  loadPin();
  // Listen for typing indicators
  _listenTyping();

  // Load starred
  db.ref('starred/'+currentUser.uid+'/'+chatId).once('value').then(function(s){
    s.forEach(function(c){_starredIds.add(c.key);});
  });

  // Load friends for @mention
  loadFriends();

  // Load friend's profile photo for bubble avatars
  db.ref('users/'+friendUid).once('value').then(function(snap){
    var u = snap.val()||{};
    window._friendPhoto = u.photoURL || null;
    // Update nav avatar too
    var navAv = document.getElementById('navAv');
    if (navAv && u.photoURL) {
      navAv.innerHTML = '<img src="'+u.photoURL+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.parentElement.textContent=\''+friendName[0].toUpperCase()+'\'">';
    }
  });

  // Load own photo + listen for changes to retro-update existing bubbles
  db.ref('users/'+currentUser.uid).on('value',function(snap){
    var u = snap.val()||{};
    var newPhoto = u.photoURL || null;
    window._myPhoto = newPhoto;
    // Retroactively update ALL my avatar divs already rendered
    document.querySelectorAll('.bwrap.mine .avatar').forEach(function(avDiv){
      if(newPhoto){
        avDiv.style.overflow='hidden';
        avDiv.innerHTML='<img src="'+newPhoto+'" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.parentElement.textContent=\''+(currentUser.displayName||'?')[0].toUpperCase()+'\'">';
      } else {
        avDiv.style.overflow='';
        avDiv.textContent=(currentUser.displayName||'?')[0].toUpperCase();
      }
    });
  });

  // Listen for messages
  // Real-time edit: update bubble text immediately without refresh
  db.ref('chats/'+chatId).on('child_changed',function(snap){
    var v = snap.val(); if(!v) return;
    var el = document.getElementById('m_'+snap.key);
    if (!el) return;
    var txtSpan = el.querySelector('._msgtext');
    if (txtSpan && v.text !== undefined) {
      txtSpan.textContent = v.text || '';
    }
    if (v.edited) {
      var bub = el.querySelector('.bubble');
      if (bub && !bub.querySelector('._editedBadge')) {
        var badge = document.createElement('span');
        badge.className = '_editedBadge';
        badge.style.cssText = 'font-size:10px;color:#8696a0;margin-left:4px;font-style:italic';
        badge.textContent = 'edited';
        var meta = bub.querySelector('.bmeta');
        if (meta) meta.insertBefore(badge, meta.firstChild);
        else bub.appendChild(badge);
      }
    }
    // Update reactions if present
    if (typeof quickReactionsHtml === 'function') {
      var rBar = el.querySelector('.reactions-bar');
      if (rBar) rBar.innerHTML = quickReactionsHtml(v.reactions, snap.key);
    }
  });

  db.ref('chats/'+chatId).limitToLast(120).on('child_added',function(snap){
    var v=snap.val();
    renderMsg({id:snap.key,...v});
  });

  db.ref('chats/'+chatId).on('child_removed',function(snap){
    var el=document.getElementById('msg_'+snap.key);
    if(el){el.style.transition='all .3s';el.style.opacity='0';setTimeout(function(){el.remove();},300);}
  });

  // ── Offline fallback: show cached messages when offline ─────────────────
  if (typeof OfflineCache !== 'undefined') {
    var _privBanner = null;
    function _showPrivBanner(online) {
      if (!_privBanner) {
        _privBanner = document.createElement('div');
        _privBanner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;text-align:center;font-size:13px;font-weight:600;padding:7px 16px;transition:all .3s;pointer-events:none';
        document.body.appendChild(_privBanner);
      }
      if (online) {
        _privBanner.style.background = 'rgba(16,185,129,.9)'; _privBanner.style.color='#fff';
        _privBanner.textContent = '✅ Back online'; setTimeout(function(){_privBanner.style.display='none';},2500);
      } else {
        _privBanner.style.display=''; _privBanner.style.background='rgba(239,68,68,.9)'; _privBanner.style.color='#fff';
        _privBanner.textContent = '📵 Offline — showing cached messages';
      }
    }
    OfflineCache.onConnChange(function(online) {
      _showPrivBanner(online);
      if (!online) {
        var box = document.getElementById('msgBox');
        if (!box || box.children.length > 0) return;
        OfflineCache.getMsgs('priv_' + chatId, 120).then(function(msgs) {
          if (!msgs || !msgs.length) return;
          msgs.forEach(function(m) { renderMsg(m); });
        });
      }
    });
    if (!OfflineCache.isOnline()) {
      setTimeout(function(){ _showPrivBanner(false); }, 400);
      var box = document.getElementById('msgBox');
      if (box && box.children.length === 0) {
        OfflineCache.getMsgs('priv_' + chatId, 120).then(function(msgs) {
          if (msgs && msgs.length) msgs.forEach(function(m){ renderMsg(m); });
        });
      }
    }
  }
}

// Instant download — no browser redirect
function instantDownload(url, filename) {
  showToast('Downloading…');
  fetch(url)
    .then(function(r){ return r.blob(); })
    .then(function(blob){
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename || 'file';
      document.body.appendChild(a); a.click();
      setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 1000);
      showToast('Downloaded!');
    })
    .catch(function(){
      var a = document.createElement('a');
      a.href = url; a.download = filename || 'file'; a.target = '_blank';
      document.body.appendChild(a); a.click();
      setTimeout(function(){ document.body.removeChild(a); }, 500);
    });
}
window.onCalcBack = closeCalc;

// ── ATTACH BUTTON: Window-level touchstart with coordinate detection ──────────
// This approach is impossible to block - it intercepts at the window level
// and checks if the touch landed on the attach button area.
// Also add a diagnostic toast so the user can confirm if taps are detected.
window.addEventListener('touchstart', function(e) {
  var btn = document.getElementById('attachBtnPlaceholder') || document.getElementById('chatroomAttachBtn');
  if (!btn) return;
  var rect = btn.getBoundingClientRect();
  var touch = e.touches[0];
  // Expand hit area by 8px in all directions to be forgiving
  if (touch.clientX >= rect.left - 8 &&
      touch.clientX <= rect.right + 8 &&
      touch.clientY >= rect.top - 8 &&
      touch.clientY <= rect.bottom + 8) {
    e.preventDefault();
    e.stopPropagation();
    if (typeof showAttachMenu === 'function') {
      showAttachMenu(onAttached);
    } else {
      showToast('Attach menu not loaded', 'error');
    }
  }
}, { passive: false });

// Also wire via click as backup (for non-touch environments)
(function() {
  var placeholder = document.getElementById('attachBtnPlaceholder');
  if (!placeholder) return;
  var btn = document.createElement('button');
  btn.className = 'pb';
  btn.id = 'chatroomAttachBtn';
  btn.title = 'Attach';
  btn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>';
  btn.onclick = function() { if (typeof showAttachMenu === 'function') showAttachMenu(onAttached); };
  placeholder.parentNode.replaceChild(btn, placeholder);
})();

// ── MEDIA/LINKS/DOCS VIEWER for private chat ─────────────────────────────────
function showChatroomMedia() {
  if (!chatId) return;
  var d = document.createElement('div');
  d.id = '_crmMediaSheet';
  d.style.cssText = 'position:fixed;inset:0;z-index:9900;background:#0d1117;display:flex;flex-direction:column';

  // Build with DOM methods to avoid quote-escaping hell
  var nav = document.createElement('div');
  nav.style.cssText = 'background:#1a1f2e;border-bottom:1px solid #2a3942;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0';
  var backBtn = document.createElement('button');
  backBtn.style.cssText = 'width:40px;height:40px;background:#2a3942;border-radius:12px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center';
  backBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e9edef" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>';
  backBtn.onclick = function(){ d.remove(); };
  var title = document.createElement('span');
  title.style.cssText = 'color:#fff;font-weight:700;font-size:16px';
  title.textContent = 'Media, Links & Docs';
  nav.appendChild(backBtn); nav.appendChild(title);

  var tabBar = document.createElement('div');
  tabBar.style.cssText = 'display:flex;border-bottom:1px solid #2a3942;flex-shrink:0';
  ['media','links','docs'].forEach(function(t, i) {
    var btn = document.createElement('button');
    btn.id = 'crmTab_' + t;
    btn.style.cssText = 'flex:1;background:none;border:none;border-bottom:2px solid '+(i===0?'#ec4899':'transparent')+';padding:12px;color:'+(i===0?'#ec4899':'#6b7280')+';font-weight:'+(i===0?'700':'400')+';font-size:13px;cursor:pointer';
    btn.textContent = t.charAt(0).toUpperCase() + t.slice(1);
    btn.onclick = function(){ crmSwitchTab(t); };
    tabBar.appendChild(btn);
  });

  var content = document.createElement('div');
  content.id = 'crmTabContent';
  content.style.cssText = 'flex:1;overflow-y:auto;padding:12px';

  d.appendChild(nav); d.appendChild(tabBar); d.appendChild(content);
  document.body.appendChild(d);

  window.crmSwitchTab = function(tab) {
    ['media','links','docs'].forEach(function(t) {
      var btn = document.getElementById('crmTab_' + t);
      if (btn) {
        btn.style.borderBottomColor = t===tab ? '#ec4899' : 'transparent';
        btn.style.color = t===tab ? '#ec4899' : '#6b7280';
        btn.style.fontWeight = t===tab ? '700' : '400';
      }
    });
    var c = document.getElementById('crmTabContent'); if (!c) return;
    c.innerHTML = '<div style="text-align:center;padding:24px;color:#6b7280">Loading...</div>';
    db.ref('messages/'+chatId).orderByChild('ts').limitToLast(200).once('value').then(function(snap) {
      var msgs = []; snap.forEach(function(s){ msgs.push(s.val()); });
      c.innerHTML = '';
      if (tab === 'media') {
        var items = msgs.filter(function(m){ return m.fileUrl && m.fileType && (m.fileType.startsWith('image/') || m.fileType.startsWith('video/')); }).reverse();
        if (!items.length) { c.innerHTML = '<div style="text-align:center;padding:30px;color:#6b7280">No media shared yet</div>'; return; }
        var grid = document.createElement('div');
        grid.style.cssText = 'display:grid;grid-template-columns:repeat(3,1fr);gap:3px';
        items.forEach(function(m) {
          var cell = document.createElement('div');
          cell.style.cssText = 'aspect-ratio:1;overflow:hidden;cursor:pointer;background:#1f2937';
          cell.onclick = function(){ window.open(m.fileUrl, '_blank'); };
          if (m.fileType.startsWith('image/')) {
            var img = document.createElement('img');
            img.src = m.fileUrl; img.loading = 'lazy';
            img.style.cssText = 'width:100%;height:100%;object-fit:cover';
            cell.appendChild(img);
          } else {
            cell.style.display = 'flex'; cell.style.alignItems = 'center'; cell.style.justifyContent = 'center';
            cell.innerHTML = '<span style="font-size:32px">&#9654;</span>';
          }
          grid.appendChild(cell);
        });
        c.appendChild(grid);
      } else if (tab === 'links') {
        var urlRe = /(https?:\/\/[^\s]+)/g; var links = [];
        msgs.forEach(function(m){ var t = m.text||''; var x; while((x=urlRe.exec(t))!==null) links.push(x[1]); });
        if (!links.length) { c.innerHTML = '<div style="text-align:center;padding:30px;color:#6b7280">No links shared yet</div>'; return; }
        links.reverse().forEach(function(l) {
          var a = document.createElement('a');
          a.href = l; a.target = '_blank';
          a.style.cssText = 'display:block;background:#1a1f2e;border-radius:14px;padding:12px 14px;margin-bottom:8px;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#60a5fa;font-size:13px';
          a.textContent = l;
          c.appendChild(a);
        });
      } else {
        var icons = {pdf:'📄',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',ppt:'📑',pptx:'📑',txt:'📃'};
        var docs = msgs.filter(function(m){ return m.fileUrl && m.fileType && !m.fileType.startsWith('image/') && !m.fileType.startsWith('video/') && !m.fileType.startsWith('audio/'); }).reverse();
        if (!docs.length) { c.innerHTML = '<div style="text-align:center;padding:30px;color:#6b7280">No docs shared yet</div>'; return; }
        docs.forEach(function(m) {
          var ext = (m.fileName||'').split('.').pop().toLowerCase();
          var btn = document.createElement('button');
          btn.style.cssText = 'display:flex;align-items:center;gap:12px;background:#1a1f2e;border-radius:14px;padding:12px 14px;margin-bottom:8px;border:none;width:100%;cursor:pointer;text-align:left';
          var ic = document.createElement('span'); ic.style.fontSize = '28px'; ic.textContent = icons[ext]||'📎';
          var info = document.createElement('div');
          var nm = document.createElement('p'); nm.style.cssText = 'color:#e9edef;font-size:13px;font-weight:600;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px';
          nm.textContent = m.fileName||'Document';
          var sub = document.createElement('p'); sub.style.cssText = 'color:#6b7280;font-size:11px;margin:2px 0 0'; sub.textContent = 'Tap to save';
          info.appendChild(nm); info.appendChild(sub);
          var dlIc = document.createElement('span'); dlIc.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-left:auto"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
          btn.appendChild(ic); btn.appendChild(info); btn.appendChild(dlIc);
          (function(url, fname){
            btn.addEventListener('click', function(){
              fetch(url).then(function(r){return r.blob();}).then(function(b){
                var a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=fname||'file';
                document.body.appendChild(a); a.click();
                setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(a.href);},1000);
                if(typeof showToast==='function') showToast('✅ Saved!');
              }).catch(function(){ window.open(url,'_blank'); });
            });
          })(m.fileUrl, m.fileName||'document');
          c.appendChild(btn);
        });
      }
    });
  };
  crmSwitchTab('media');
}
