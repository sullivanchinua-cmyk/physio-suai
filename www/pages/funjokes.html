  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;margin:0;padding:0;overflow:hidden;background:#0b141a;color:#e9edef}
    body{display:flex;flex-direction:column;width:100%;max-width:100vw;overflow-x:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    /* ── Messages ── */
    #msgs{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 6px 4px;-webkit-overflow-scrolling:touch;min-height:0;position:relative;background-size:cover;background-position:center;background-repeat:no-repeat;background-attachment:local}
    #msgs.has-wallpaper{background-attachment:scroll;background-size:100% 100vh}
    #msgs::-webkit-scrollbar{display:none}
    /* ── Bubble layout ── */
    .bwrap{display:flex;padding:2px 6px 2px 4px;align-items:flex-end;gap:5px;width:100%;max-width:100%}
    .bwrap.mine{flex-direction:row-reverse}
    .bwrap.theirs{flex-direction:row}
    .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;align-self:flex-end}
    .bcont{max-width:82%;min-width:0;display:flex;flex-direction:column}
    .bwrap.mine .bcont{align-items:flex-end}
    .bwrap.theirs .bcont{align-items:flex-start}
    /* WhatsApp bubble: wider, pointed corner, with tail */
    .bubble{padding:7px 10px 20px;font-size:14.5px;line-height:1.45;word-break:break-word;word-wrap:break-word;overflow-wrap:break-word;position:relative;box-shadow:0 1px 3px rgba(0,0,0,.35);max-width:100%;display:inline-block;min-width:88px}
    /* Mine = pink/purple, tail points RIGHT (top-right sharp) */
    .bubble.mine{background:linear-gradient(135deg,#9333ea 0%,#ec4899 100%);border-radius:7.5px 0 7.5px 7.5px;color:#fff}
    .bubble.mine::before{content:'';position:absolute;top:0;right:-8px;width:0;height:0;border-style:solid;border-width:0 0 8px 8px;border-color:transparent transparent transparent #9333ea}
    /* Theirs = dark, tail points LEFT (top-left sharp) */
    .bubble.theirs{background:#1f2c34;border-radius:0 7.5px 7.5px 7.5px;color:#e9edef}
    .bubble.theirs::before{content:'';position:absolute;top:0;left:-8px;width:0;height:0;border-style:solid;border-width:0 8px 8px 0;border-color:transparent #1f2c34 transparent transparent}
    .bubble.bot{background:#2a1f0e;border:1px solid #92400e55;border-radius:0 7.5px 7.5px 7.5px}
    .bubble.bot::before{border-color:transparent #2a1f0e transparent transparent}
    .bmeta{position:absolute;bottom:4px;right:8px;display:flex;align-items:center;gap:3px;white-space:nowrap}
    .btime{font-size:10.5px;color:rgba(255,255,255,.6)}
    /* Double tick for read receipts */
    .btick{width:16px;height:16px;fill:#fff;opacity:.75}
    .btick.read{fill:#53bdeb;opacity:1}
    .bsender{font-size:12px;color:#25d366;font-weight:600;margin:0 0 2px}
    .bubble img{max-width:220px;max-height:220px;border-radius:8px;display:block;margin-top:4px;cursor:pointer}
    .bubble audio{width:220px;max-width:100%;height:38px;margin-top:4px;border-radius:20px;display:block}
    /* WhatsApp-style reply strip */
    .reply-strip{display:flex;align-items:center;background:rgba(0,0,0,.22);border-left:4px solid #25d366;border-radius:0 8px 8px 0;padding:6px 8px;margin-bottom:8px;cursor:pointer;overflow:hidden;gap:6px}
    .rs-name{font-size:11.5px;color:#25d366;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .rs-text{font-size:12px;color:rgba(255,255,255,.65);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
    /* ── Attach-menu black bubbles ── */
    .bubble.attach-blk{background:#111827!important;border-radius:12px!important;color:#fff!important}
    .bubble.attach-blk::before{display:none!important}
    .bubble.attach-blk.mine{background:#111827!important}
    .bubble.attach-poll{border-left:3px solid #ec4899!important;padding-left:12px!important}
    @keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes _editSlideUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .bwrap{animation:msgIn .2s ease both}
    @keyframes ctxIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
    .ctx-menu{animation:ctxIn .14s ease}
    /* ── File strip ── */
    #fileStrip{display:none;background:#1f2c34;border-top:1px solid #2a3942;padding:8px 12px;flex-shrink:0}
    /* ── Recording bar ── */
    #recBar{display:none;background:#1f2c34;border-top:1px solid #2a3942;padding:10px 14px;flex-shrink:0;align-items:center;gap:10px}
    .rec-dot{width:10px;height:10px;border-radius:50%;background:#ef4444;flex-shrink:0;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.2)}}
    /* ── Input bar ── */
    #inputBar{flex-shrink:0;background:#1f2c34;border-top:1px solid #2a3942;padding:6px 8px}
    .inp-row{display:flex;align-items:flex-end;gap:6px;width:100%;max-width:100%}
    .inp-pill{flex:1;min-width:0;display:flex;align-items:center;background:#2a3942;border-radius:26px;padding:3px 8px 3px 14px;gap:4px}
    .p-btn{width:36px;height:36px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#8696a0;flex-shrink:0;border-radius:50%;padding:0}
    .p-btn:active{background:rgba(255,255,255,.1)}
    .p-btn svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    #msgInp{flex:1;min-width:0;width:1px;background:none;border:none;outline:none;color:#e9edef;font-size:15px;padding:8px 2px;font-family:inherit;line-height:1.4}
    #msgInp::placeholder{color:#8696a0}
    #micSendBtn{width:52px;height:52px;min-width:52px;border-radius:50%;background:linear-gradient(135deg,#ec4899,#8b5cf6);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(236,72,153,.4);transition:background .2s,transform .1s}
    #micSendBtn:active{transform:scale(.92)}
    #micSendBtn svg{width:24px;height:24px;fill:white}
    /* ── Emoji picker ── */
    #emojiPick{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:#1f2c34;border-top:1px solid #2a3942;padding:12px 8px 28px;max-height:220px;overflow-y:auto}
    .eg{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
    .eg span{font-size:26px;cursor:pointer;text-align:center;padding:5px;border-radius:8px;display:block;user-select:none}
    .eg span:active{background:#2a3942;transform:scale(1.2)}
    #emojiPick button{width:100%;background:none;border:none;color:#8696a0;font-size:13px;padding:10px 0 2px;cursor:pointer}
    /* ── Loading ── */
    #loadingOverlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:rgba(0,0,0,.65);align-items:center;justify-content:center}
    #loadingOverlay:not(.hidden){display:flex}
    @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes waDotBounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-5px);opacity:1;background:#a855f7}}
  .waDot{animation:waDotBounce 1.3s ease-in-out infinite}
  @keyframes waBarPulse{0%,100%{height:4px;opacity:.4}50%{height:18px;opacity:1}}
  .waBar{width:3px;border-radius:2px;background:#a855f7;display:inline-block;animation:waBarPulse 1s ease-in-out infinite}
  </style>
</head>

        bx=Math.max(0,Math.min(x,imgR.width-20));

            if(!blob){URL.revokeObjectURL(objUrl);ov.remove();onSend(file,cap,_viewOnce);return;}
            var flat=new File([blob],file.name||'image.jpg',{type:'image/jpeg',lastModified:Date.now()});
            URL.revokeObjectURL(objUrl);ov.remove();onSend(flat,cap,_viewOnce);
          },'image/jpeg',0.93);
          return;
        }catch(err){console.warn('composite failed:',err);}
      }
    }
    URL.revokeObjectURL(objUrl);ov.remove();onSend(file,cap,_viewOnce);
  };
  capInput.addEventListener('keydown',function(e){if(e.key==='Enter')sendBtn.click();});
  setTimeout(function(){capInput.focus();},350);
}

    _pendingText = extra || type;

  if (typeof showFilePreview === 'function' && (file.type.startsWith('image/') || file.type.startsWith('video/'))) {
    showFilePreview(file, function(f, caption, viewOnce) {

        if (nm) nm.textContent = f.name;
        if (sz) sz.textContent = (f.size>1048576?(f.size/1048576).toFixed(1)+' MB':(f.size/1024).toFixed(0)+' KB') + (viewOnce?' · View once':'');

        if (is) is.style.display = 'flex';

      } else {
        // Video: show icon strip then send
        sendFjFile(f, caption);
      }
    });
    return;
  }
  // Other file types: queue in strip, user taps send

function fjInitSwipe(wrap, id, sender, text, fileUrl, fileType, viewOnce) {
  var startX=0, startY=0, dx=0, swiped=false;
  var el = wrap.querySelector('.bcont');
  if (!el) return;
  wrap.addEventListener('touchstart',function(e){
    startX=e.touches[0].clientX; startY=e.touches[0].clientY; dx=0; swiped=false;
  },{passive:true});
  wrap.addEventListener('touchmove',function(e){
    var dy=Math.abs(e.touches[0].clientY-startY);
    dx=e.touches[0].clientX-startX;
    if(dy>20){dx=0;return;}
    if(dx>0&&dx<120){el.style.transform='translateX('+dx+'px)';el.style.transition='none';}
  },{passive:true});
  wrap.addEventListener('touchend',function(){
    el.style.transition='transform .2s ease'; el.style.transform='';
    if(dx>130&&!swiped){swiped=true;if(navigator.vibrate)navigator.vibrate(30);fjSetReply(id,sender,text,fileUrl,fileType,viewOnce);}
  });
}

    function _pushSticker(url){

      var obj={fileUrl:u,fileType:'image/gif',sender:'Anonymous',sessionId:_anonId,ts:Date.now()};

      var ref=db.ref('fun_chat').push(obj);

    }
    // Re-upload GIPHY gif to R2 so it works in WebView without CORS issues
    fetch(url,{mode:'cors'}).then(function(r){return r.blob();}).then(function(blob){
      var file=new File([blob],'gif_'+Date.now()+'.gif',{type:'image/gif'});
      showFjPill('Sending GIF…');
      uploadFile(file,'gifs').then(function(res){
        hideFjPill();

      }).catch(function(){hideFjPill();_pushGif(url);});
    }).catch(function(){_pushGif(url);});
  },

    if(_reply) fjClearReply();
    var file=new File([blob],'voice_'+Date.now()+'.webm',{type:mime});

function _anonIsExpired(ts) {
  var e = _anonGetExpiry();

      '<div style="font-size:12px;color:rgba(255,255,255,.4)">'+new Date(d.ts||Date.now()).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+'</div>' +
      '<button data-cid="'+card.id+'" data-cprev="'+encodeURIComponent((d.text||'').substring(0,80))+'" onclick="event.stopPropagation();openAnonComments(this.dataset.cid,decodeURIComponent(this.dataset.cprev))" style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);border:none;border-radius:20px;padding:8px 14px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent">' +
        '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
        replyCount+' Comments' +
      '</button>' +
    '</div>';

  // Swipe support
  var _sx = null, _dx = 0;
  el.addEventListener('touchstart', function(e){ _sx = e.touches[0].clientX; }, {passive:true});
  el.addEventListener('touchmove', function(e){
    if (_sx === null) return;
    _dx = e.touches[0].clientX - _sx;
    el.style.transform = 'translateX('+(_dx*0.25)+'px) rotate('+(_dx*0.01)+'deg)';
  }, {passive:true});
  el.addEventListener('touchend', function(e) {
    if (_sx === null) return;
    el.style.transform = '';
    var finalDx = e.changedTouches[0].clientX - _sx; _sx = null;
    if (Math.abs(finalDx) > 55) { _anonNav(finalDx < 0 ? 1 : -1); }
  }, {passive:true});

  // Double-tap = open comments
  var _lastTap = 0;
  el.addEventListener('click', function() {
    var now = Date.now();
    if (now - _lastTap < 380) { openAnonComments(card.id, (d.text||'').substring(0,80)); _lastTap = 0; }
    else _lastTap = now;
  });

  area.innerHTML = ''; area.appendChild(el);
}

function _anonNav(dir) {
  if (_anonAnimating) return;
  _anonAnimating = true;
  _anonIdx += dir;
  if (_anonIdx < 0) _anonIdx = _anonCards.length - 1;
  if (_anonIdx >= _anonCards.length) _anonIdx = 0;
  _anonRenderCard(dir);
  setTimeout(function(){ _anonAnimating = false; }, 350);
}

/* ── Compose Card ─────────────────────────── */
function openAnonCompose() {
  var ex = document.getElementById('_anonCompOv'); if (ex) { ex.remove(); return; }
  var ov = document.createElement('div'); ov.id = '_anonCompOv';
  ov.style.cssText = 'position:fixed;inset:0;z-index:100001;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center';
  ov.onclick = function(e){ if(e.target===ov) ov.remove(); };
  ov.innerHTML =
    '<div style="width:100%;max-width:520px;background:#111827;border-radius:24px 24px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom))">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">' +
        '<div style="font-size:17px;font-weight:800;color:#fff">🎭 Post Anonymous Card</div>' +
        '<button onclick="document.getElementById(\'_anonCompOv\').remove()" style="background:#1f2937;border:none;border-radius:50%;width:32px;height:32px;color:#9ca3af;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center">✕</button>' +
      '</div>' +
      '<textarea id="_anonText" placeholder="Write something anonymously… 😶‍🌫️" maxlength="280" style="width:100%;background:#1a1f2e;border:1px solid #374151;border-radius:16px;padding:14px;color:#fff;font-size:15px;outline:none;resize:none;height:130px;box-sizing:border-box;font-family:inherit;caret-color:#8b5cf6"></textarea>' +
      '<div style="display:flex;align-items:center;gap:10px;margin-top:12px">' +
        '<label style="flex:1;background:#1a1f2e;border:1px solid #374151;border-radius:14px;padding:12px;color:#9ca3af;font-size:13px;cursor:pointer;text-align:center">📷 Image<input type="file" accept="image/*" id="_anonImgIn" style="display:none" onchange="_anonPreviewMedia(this,false)"></label>' +
        '<label style="flex:1;background:#1a1f2e;border:1px solid #374151;border-radius:14px;padding:12px;color:#9ca3af;font-size:13px;cursor:pointer;text-align:center">🎬 Video<input type="file" accept="video/*" id="_anonVidIn" style="display:none" onchange="_anonPreviewMedia(this,true)"></label>' +
        '<button onclick="_anonSubmitCard()" style="flex:2;background:linear-gradient(135deg,#9333ea,#ec4899);border:none;border-radius:14px;padding:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer">Post Card</button>' +
      '</div>' +
      '<div id="_anonImgPrev" style="margin-top:10px"></div>' +
    '</div>';
  document.body.appendChild(ov);
  setTimeout(function(){ var t=document.getElementById('_anonText'); if(t) t.focus(); }, 100);
}

window._anonPreviewImg = function(inp) { window._anonPreviewMedia(inp, false); };
window._anonPreviewMedia = function(inp, isVideo) {
  var prev = document.getElementById('_anonImgPrev'); if (!inp.files||!inp.files[0]||!prev) return;
  var r = new FileReader();
  r.onload = function(e){
    if (isVideo) {
      prev.innerHTML = '<video src="'+e.target.result+'" controls muted playsinline style="width:100%;border-radius:16px;max-height:200px;object-fit:cover;display:block"></video><p style="font-size:11px;color:#6b7280;margin:4px 0 0;text-align:center">'+inp.files[0].name+'</p>';
    } else {
      prev.innerHTML = '<img src="'+e.target.result+'" style="max-width:100%;border-radius:12px;max-height:140px;object-fit:cover">';
    }
  };
  r.readAsDataURL(inp.files[0]);
};

window._anonSubmitCard = function() {
  var text = (document.getElementById('_anonText')||{}).value || '';
  if (!text.trim()) { if(typeof showToast==='function') showToast('Write something first!','error'); return; }
  var imgInp = document.getElementById('_anonImgIn');
  var vidInp = document.getElementById('_anonVidIn');
  var imgFile = imgInp && imgInp.files && imgInp.files[0];
  var vidFile = vidInp && vidInp.files && vidInp.files[0];
  var file = vidFile || imgFile;
  var isVideo = !!vidFile;
  function _pushCard(mediaUrl) {
    var obj = {text:text.trim(), ts:Date.now()};
    if (mediaUrl && isVideo) obj.videoUrl = mediaUrl;
    else if (mediaUrl) obj.imageUrl = mediaUrl;
    db.ref('anon_cards').push(obj).then(function(){
      if(typeof showToast==='function') showToast('🎭 Card posted anonymously!');
      var ov=document.getElementById('_anonCompOv'); if(ov) ov.remove();
    }).catch(function(){ if(typeof showToast==='function') showToast('Failed to post','error'); });
  }
  if (file && typeof uploadFileWithProgress === 'function') {
    if(typeof showToast==='function') showToast(isVideo?'Uploading video…':'Uploading image…');
    uploadFileWithProgress(file,'anon_cards',function(){}).then(function(res){ _pushCard(res&&res.success?res.url:null); }).catch(function(){ _pushCard(null); });
  } else { _pushCard(null); }
};

/* ── TikTok-style Comments ───────────────── */
function openAnonComments(cardId, previewText) {
  var ex = document.getElementById('_anonCommOv'); if (ex) { ex.remove(); return; }
  var ov = document.createElement('div'); ov.id = '_anonCommOv';
  ov.style.cssText = 'position:fixed;inset:0;z-index:9999999;display:flex;flex-direction:column;justify-content:flex-end';
  // Backdrop
  var bd = document.createElement('div');
  bd.style.cssText = 'position:absolute;inset:0;background:rgba(0,0,0,.5)';
  bd.onclick = function(){ ov.remove(); };
  ov.appendChild(bd);
  // Sheet
  var sheet = document.createElement('div');
  sheet.style.cssText =
    'position:relative;z-index:1;background:#111827;border-radius:24px 24px 0 0;' +
    'max-height:75vh;display:flex;flex-direction:column;' +
    'animation:_anonCommentIn .3s cubic-bezier(.25,.46,.45,.94) both;' +
    'padding-bottom:env(safe-area-inset-bottom)';
  sheet.innerHTML =
    // Handle
    '<div style="display:flex;justify-content:center;padding:12px 0 6px"><div style="width:40px;height:4px;background:#374151;border-radius:2px"></div></div>' +
    // Header
    '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 20px 12px;border-bottom:1px solid #1f2937;flex-shrink:0">' +
      '<div><div style="font-size:16px;font-weight:800;color:#fff">💬 Comments</div>' +
      '<div style="font-size:12px;color:#6b7280;margin-top:2px">Re: "'+decodeURIComponent(previewText||'')+(previewText&&previewText.length>=80?'…':'')+'"</div></div>' +
      '<button onclick="document.getElementById(\'_anonCommOv\').remove()" style="background:#1f2937;border:none;border-radius:50%;width:32px;height:32px;color:#9ca3af;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center">✕</button>' +
    '</div>' +
    // Comments list
    '<div id="_anonCommList" style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 0"><div style="text-align:center;padding:30px 20px;color:#4b5563;font-size:14px">Loading…</div></div>' +
    // Name-reveal toggle row
    '<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;flex-shrink:0;background:#111827">' +
      '<span style="font-size:12px;color:#6b7280">Comment as:</span>' +
      '<div style="flex:1"></div>' +
      '<span id="_anonRevealLbl" style="font-size:13px;color:#8b5cf6;font-weight:700">Anonymous</span>' +
      '<div id="_anonToggleWrap" onclick="_anonToggleSwitch()" ' +
        'style="width:46px;height:26px;border-radius:13px;background:#374151;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;-webkit-tap-highlight-color:transparent">' +
        '<div id="_anonToggleThumb" style="position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s"></div>' +
      '</div>' +
    '</div>' +
    // Input row
    '<div style="display:flex;align-items:center;gap:10px;padding:10px 16px 12px;border-top:none;flex-shrink:0;background:#111827">' +
      '<div id="_anonCommAv" style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#6d28d9,#ec4899);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">😶</div>' +
      '<input id="_anonCommInput" placeholder="Add a comment… (anonymous)" maxlength="200" style="flex:1;background:#1a1f2e;border:1px solid #374151;border-radius:24px;padding:10px 16px;color:#fff;font-size:14px;outline:none;caret-color:#8b5cf6;font-family:inherit">' +
      '<button id="_anonCommSend" style="background:linear-gradient(135deg,#9333ea,#ec4899);border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0">' +
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="white"><polygon points="22 2 11 13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>' +
      '</button>' +
    '</div>';
  ov.appendChild(sheet);
  document.body.appendChild(ov);

  // Load comments live
  var listEl = document.getElementById('_anonCommList');
  db.ref('anon_cards/'+cardId+'/replies').orderByChild('ts').on('value', function(snap) {
    if (!document.getElementById('_anonCommOv')) return;
    var items = [];
    snap.forEach(function(c){ items.push({id:c.key, d:c.val()}); });
    if (!items.length) {
      listEl.innerHTML = '<div style="text-align:center;padding:40px 20px;color:#4b5563"><div style="font-size:40px;margin-bottom:10px">💬</div><div style="font-size:15px">No comments yet</div><div style="font-size:13px;margin-top:4px;color:#374151">Be the first to comment!</div></div>';
      return;
    }
    listEl.innerHTML = items.map(function(item, i){
      var d = item.d;
      var ago = _anonTimeAgo(d.ts);
      return '<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 16px;'+(i>0?'border-top:1px solid #1f2937':'')+'">' +
        '<div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#'+(i%2===0?'6d28d9,#ec4899':'1d4ed8,#7c3aed')+');display:flex;align-items:center;justify-content:center;font-size:'+(d.name?'18':'15')+'px;font-weight:700;flex-shrink:0;color:#fff">'+(d.name?d.name[0].toUpperCase():'😶')+'</div>' +
        '<div style="flex:1;min-width:0">' +
          '<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:3px">' +
            '<span style="color:#fff;font-size:13.5px;font-weight:700">'+(d.name||'Anonymous')+'</span>' +
            '<span style="color:#6b7280;font-size:11px">'+ago+'</span>' +
          '</div>' +
          '<div style="color:#d1d5db;font-size:14px;line-height:1.5">'+(d.text||'')+'</div>' +
        '</div>' +
      '</div>';
    }).join('');
    listEl.scrollTop = listEl.scrollHeight;
  });

  // Send comment — name-aware
  document.getElementById('_anonCommSend').addEventListener('click', function() {
    var inp = document.getElementById('_anonCommInput');
    var t = (inp||{}).value || '';
    if (!t.trim()) return;
    var revealed = !_anonCommentAsAnon;
    var _cu = window.currentUser || (typeof auth !== 'undefined' && auth.currentUser);
    var commenterName = revealed && _cu
      ? (_cu.displayName || (_cu.email ? _cu.email.split('@')[0] : null) || null)
      : null;
    var obj = {text:t.trim(), ts:Date.now()};
    if (commenterName) obj.name = commenterName;
    db.ref('anon_cards/'+cardId+'/replies').push(obj);
    if (inp) inp.value = '';
  });
  document.getElementById('_anonCommInput').addEventListener('keydown', function(e){
    if (e.key==='Enter') { document.getElementById('_anonCommSend').click(); }
  });
  setTimeout(function(){ var i=document.getElementById('_anonCommInput'); if(i) i.focus(); }, 300);
}

// Global flag for anon comment toggle
var _anonCommentAsAnon = true;

function _anonToggleSwitch() {
  _anonCommentAsAnon = !_anonCommentAsAnon;
  var wrap = document.getElementById('_anonToggleWrap');
  var thumb = document.getElementById('_anonToggleThumb');
  var lbl = document.getElementById('_anonRevealLbl');
  var av = document.getElementById('_anonCommAv');
  var inp = document.getElementById('_anonCommInput');

  if (_anonCommentAsAnon) {
    // Anonymous mode
    if (wrap) wrap.style.background = '#374151';
    if (thumb) thumb.style.left = '3px';
    if (lbl) { lbl.textContent = 'Anonymous'; lbl.style.color = '#8b5cf6'; }
    if (av) { av.style.background = 'linear-gradient(135deg,#6d28d9,#ec4899)'; av.textContent = '😶'; }
    if (inp) inp.placeholder = 'Add a comment… (anonymous)';
  } else {
    // Named mode
    var myName = 'You';
    if (window.currentUser) {
      myName = window.currentUser.displayName ||
        (window.currentUser.email ? window.currentUser.email.split('@')[0] : null) ||
        (auth && auth.currentUser && auth.currentUser.displayName) || 'You';
    }
    if (wrap) wrap.style.background = 'linear-gradient(135deg,#9333ea,#ec4899)';
    if (thumb) thumb.style.left = '23px';
    if (lbl) { lbl.textContent = myName; lbl.style.color = '#ec4899'; }
    if (av) { av.style.background = 'linear-gradient(135deg,#ec4899,#f97316)'; av.textContent = myName[0].toUpperCase(); }
    if (inp) inp.placeholder = 'Add a comment… (as ' + myName + ')';
  }
}

function _anonTimeAgo(ts) {
  if (!ts) return '';
  var s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60)+'m';
  if (s < 86400) return Math.floor(s/3600)+'h';
  return Math.floor(s/86400)+'d';
}

/* ── Settings ────────────────────────────── */
function openAnonSettings() {
  var ex = document.getElementById('_anonSettOv'); if (ex) { ex.remove(); return; }
  var ov = document.createElement('div'); ov.id = '_anonSettOv';
  ov.style.cssText = 'position:fixed;inset:0;z-index:100001;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center';
  ov.onclick = function(e){ if(e.target===ov) ov.remove(); };
  var cur = _anonGetExpiry();
  var opts = [
    {v:'never',  lb:'♾️ Never expire',      sub:'Cards stay forever'},
    {v:'daily',  lb:'☀️ Daily',             sub:'Cards disappear after 24 hours'},
    {v:'weekly', lb:'📅 Weekly',            sub:'Cards disappear after 7 days'},
    {v:'monthly',lb:'🗓️ Monthly',           sub:'Cards disappear after 30 days'}
  ];
  ov.innerHTML =
    '<div style="width:100%;max-width:520px;background:#111827;border-radius:24px 24px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom))">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">' +
        '<div style="font-size:17px;font-weight:800;color:#fff">⚙️ Card Settings</div>' +
        '<button onclick="document.getElementById(\'_anonSettOv\').remove()" style="background:#1f2937;border:none;border-radius:50%;width:32px;height:32px;color:#9ca3af;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center">✕</button>' +
      '</div>' +
      '<div style="font-size:12px;color:#6b7280;font-weight:700;letter-spacing:.5px;margin-bottom:10px">CARD EXPIRY</div>' +
      opts.map(function(o){
        var sel = cur === o.v;
        return '<button onclick="_anonSetExpiry(\''+o.v+'\')" style="display:flex;align-items:center;gap:14px;width:100%;background:'+(sel?'rgba(139,92,246,.15)':'#1a1f2e')+';border:'+(sel?'2px solid #8b5cf6':'1px solid #374151')+';border-radius:16px;padding:14px;margin-bottom:8px;cursor:pointer;text-align:left">' +
          '<div style="flex:1">' +
            '<div style="color:#fff;font-size:14px;font-weight:700">'+o.lb+'</div>' +
            '<div style="color:#6b7280;font-size:12px;margin-top:2px">'+o.sub+'</div>' +
          '</div>' +
          (sel ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="#8b5cf6"><polyline points="20 6 9 17 4 12"/></svg>' : '') +
        '</button>';
      }).join('') +
    '</div>';
  document.body.appendChild(ov);
}

window._anonSetExpiry = function(val) {
  localStorage.setItem('_anonExpiry', val);
  var ov = document.getElementById('_anonSettOv'); if (ov) ov.remove();
  if (typeof showToast === 'function') {
    var labels = {never:'♾️ Cards never expire',daily:'☀️ Cards expire daily',weekly:'📅 Cards expire weekly',monthly:'🗓️ Cards expire monthly'};
    showToast(labels[val]||'Settings saved');
  }
  _anonLoadCards(); // refresh with new expiry
};

<script>
// Bug 5 fix: save & restore funjokes page savepoint (chat scroll position)
(function(){
  var _sp_key = 'funjokes';
  var _sp_timer = null;
  function _saveSP(){
    if(typeof OfflineDB === 'undefined') return;
    var msgsEl = document.getElementById('msgs');
    var scrollTop = msgsEl ? msgsEl.scrollTop : 0;
    OfflineDB.saveSavepoint(_sp_key, { scrollTop: scrollTop, savedAt: Date.now() });
  }
  function _debounceSave(){ clearTimeout(_sp_timer); _sp_timer = setTimeout(_saveSP, 800); }
  function _restoreSP(){
    if(typeof OfflineDB === 'undefined') return;
    OfflineDB.getSavepoint(_sp_key).then(function(sp){
      if(!sp || !sp.data || !sp.data.scrollTop) return;
      setTimeout(function(){
        var msgsEl = document.getElementById('msgs');
        if(msgsEl) msgsEl.scrollTop = sp.data.scrollTop;
      }, 800);
    });
  }
  var msgsEl = document.getElementById('msgs');
  if(msgsEl) msgsEl.addEventListener('scroll', _debounceSave, { passive: true });
  document.addEventListener('visibilitychange', function(){ if(document.hidden) _saveSP(); });
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', _restoreSP);
  else setTimeout(_restoreSP, 600);
})();
</script>
