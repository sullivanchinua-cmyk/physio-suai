##############################################################
# PHYSIO SUAI — codemagic.yaml
##############################################################

workflows:

  physio-android-debug:
    name: Physio SUAI — Android Debug APK
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      node: 20.11.0
      java: 21
      vars:
        PACKAGE_NAME: "com.physiosuai.app"

    cache:
      cache_paths:
        - $HOME/.gradle/caches

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install npm packages
        script: |
          rm -rf node_modules
          npm install --legacy-peer-deps

      - name: Sync Capacitor
        script: npx cap sync android

      - name: Set Gradle permissions
        script: chmod +x android/gradlew

      - name: Build Android debug APK
        script: |
          cd android
          ./gradlew assembleDebug --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
      - android/app/build/outputs/logs/**

    publishing:
      email:
        recipients:
          - physiosuai@gmail.com
        notify:
          success: true
          failure: true

  ##############################################################

  physio-android-release:
    name: Physio SUAI — Android Release AAB
    instance_type: mac_mini_m2
    max_build_duration: 90

    environment:
      node: 20.11.0
      java: 21
      groups:
        - physio_keystore
        - google_play
      vars:
        PACKAGE_NAME: "com.physiosuai.app"

    cache:
      cache_paths:
        - $HOME/.gradle/caches

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Install npm packages
        script: |
          rm -rf node_modules
          npm install --legacy-peer-deps

      - name: Sync Capacitor
        script: npx cap sync android

      - name: Set Gradle permissions
        script: chmod +x android/gradlew

      - name: Decode keystore
        script: echo $KEYSTORE_FILE | base64 --decode > android/app/physio_release.jks

      - name: Build release AAB
        script: |
          cd android
          ./gradlew bundleRelease --no-daemon \
            -PKEYSTORE_FILE=$(pwd)/app/physio_release.jks \
            -PKEYSTORE_PASSWORD=$KEYSTORE_PASSWORD \
            -PKEY_ALIAS=$KEY_ALIAS \
            -PKEY_PASSWORD=$KEY_PASSWORD \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"

    artifacts:
      - android/app/build/outputs/bundle/release/app-release.aab
      - android/app/build/outputs/mapping/release/mapping.txt

    publishing:
      google_play:
        credentials: $GPLAY_SERVICE_ACCOUNT_JSON
        track: internal
        submit_as_draft: true
      email:
        recipients:
          - physiosuai@gmail.com
        notify:
          success: true
          failure: true
