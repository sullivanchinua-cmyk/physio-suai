workflows:
  android-release:
    name: Physio SUAI – Android Release Build
    max_build_duration: 60
    environment:
      vars:
        PACKAGE_NAME: "com.physiosuai.app"
        KEYSTORE_PATH: "keystore/physio-suai.jks"
        KEY_ALIAS: "physiosuai"
        KEYSTORE_PASSWORD: "1qaz0plm"
        KEY_PASSWORD: "1qaz0plm"
      node: 22
      java: 17

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Set up Google Services JSON
        script: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json
          elif [ ! -f android/app/google-services.json ]; then
            echo '{"project_info":{"project_number":"000000","project_id":"placeholder","storage_bucket":"placeholder.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000:android:000000","android_client_info":{"package_name":"com.physiosuai.app"}},"api_key":[{"current_key":"placeholder"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' \
              > android/app/google-services.json
          fi

      - name: Install Node dependencies
        script: |
          npm install --legacy-peer-deps

      - name: Sync Capacitor
        script: |
          npx cap sync android

      - name: Make Gradle wrapper executable
        script: |
          chmod +x android/gradlew

      - name: Build and sign Release APK & AAB
        script: |
          cd android
          ./gradlew assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file=$CM_BUILD_DIR/$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon

    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk
      - android/app/build/outputs/bundle/release/app-release.aab
      - android/app/build/outputs/mapping/release/mapping.txt

    publishing:
      email:
        recipients:
          - sullivan@physiosuai.app
        notify:
          success: true
          failure: true
